<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zumly - Home Assistant + Orbit CSS</title>
    <link rel="stylesheet" href="https://unpkg.com/zumly/dist/zumly.css" />
    <link rel="stylesheet" href="https://unpkg.com/@zumer/orbit@latest/dist/orbit.css" />
    <style>
      :root {
        --ha-bg: #0f1117;
        --ha-blue: #5b7aad;
        --ha-cyan: #8b9cb5;
        --ha-green: #4d9d6f;
        --ha-green-light: #6aa882;
        --ha-text: #d2d6df;
        --ha-muted: rgba(210, 214, 223, 0.38);
        --ha-surface: rgba(255, 255, 255, 0.04);
        --ha-border: rgba(255, 255, 255, 0.09);
        --fx-color: var(--ha-blue);
        --fx-font: #a8b8d4;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--ha-bg);
        color: var(--ha-text);
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 300;
        overflow: hidden;
      }

      .mount { position: absolute; inset: 0; overflow: hidden; }
      .canvas { width: 100%; height: 100%; }

      /* Active navigation inputs (Zumly) — does not capture pointer events */
      .ha-input-hint {
        position: absolute;
        z-index: 30;
        right: 10px;
        bottom: 10px;
        left: auto;
        max-width: min(420px, calc(100vw - 56px));
        pointer-events: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 6px 9px;
        font-size: 0.78rem;
        color: var(--ha-muted);
        line-height: 1.35;
        text-align: right;
      }
      .ha-input-hint-label {
        width: 100%;
        text-align: right;
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(210, 214, 223, 0.55);
      }
      .ha-input-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 9px;
        border-radius: 5px;
        border: 1px solid var(--ha-border);
        background: rgba(15, 17, 23, 0.75);
        color: var(--ha-text);
        white-space: nowrap;
      }
      .ha-input-pill kbd {
        font-family: ui-monospace, monospace;
        font-size: 0.7rem;
        padding: 1px 4px;
        border-radius: 3px;
        background: var(--ha-surface);
        border: 1px solid var(--ha-border);
        color: var(--ha-cyan);
      }
      .ha-input-hint-note {
        width: 100%;
        text-align: right;
        font-size: 0.68rem;
        opacity: 0.8;
      }

      /* ── Base view ──────────────────────────────────────── */
      .v {
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--ha-bg);
      }

      /* ── Orbit CSS overrides ────────────────────────────── */
      .satellite { border: none; }

      .ring { border-width: 2px; border-style: solid; }
      .ring.glow { border-color: var(--fx-color); }
      .ring.bold { border-width: 3px; }

      .vector.glow { background-color: var(--fx-color); }

      .satellite.glow {
        border: none;
        color: var(--fx-color);
      }

      o-arc.glow { --o-fill: var(--fx-color); }
      o-arc.transparent { --o-fill: none; }

      .translucid { opacity: 0.5; }

      .label { color: var(--fx-font); font-size: 11px; }
      .emphasis { font-weight: bold; font-size: 20px; }

      .eye-info {
        width: 200px;
        text-align: center;
        color: var(--fx-font);
        flex-direction: column;
      }

      /* Menu items */
      .menu-item {
        border: none;
        cursor: pointer;
      }
      .menu-item .capsule {
        overflow: visible;
      }
      .menu-item .fx-icon { fill: var(--fx-font); }

      /* Selector arcs */
      .selector {
        opacity: 0;
        color: var(--fx-font);
        --o-fill: var(--fx-color);
        --o-stroke: var(--fx-color);
      }
      .selector:hover,
      .selector.active {
        transition: opacity 1s;
        opacity: 1;
        --o-fill: none;
        --o-stroke: var(--fx-color);
      }

      /* ── Cameras view ───────────────────────────────────── */
      .cam-view {
        width: 100%; height: 100%;
        background: transparent;
      }

      .cam-view .gravity-spot {
        --o-force: 320px;
      }

      .cam-view .satellite { border: none; overflow: visible; }
      .cam-view .capsule { overflow: visible; }

      /* Camera card */
      .cam-card {
        width: 140px;
        height: 110px;
        border-radius: 10px;
        border: 1px solid var(--ha-border);
        background: var(--ha-surface);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        cursor: default;
        transition: border-color 0.2s;
        position: relative;
        overflow: hidden;
      }
      .cam-card:hover {
        border-color: rgba(255, 255, 255, 0.16);
      }

      /* Simulated camera feed */
      .cam-feed {
        width: 120px;
        height: 68px;
        border-radius: 6px;
        overflow: hidden;
        position: relative;
      }
      .cam-feed-bg {
        width: 100%;
        height: 100%;
        background: #161a22;
        position: relative;
      }
      .cam-feed-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .cam-feed-shade {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.42) 0%,
          transparent 38%,
          transparent 58%,
          rgba(0, 0, 0, 0.5) 100%
        );
      }

      /* REC indicator */
      .cam-rec {
        position: absolute;
        top: 4px;
        left: 6px;
        display: flex;
        align-items: center;
        gap: 3px;
        font-size: 6px;
        font-family: monospace;
        font-weight: 700;
        color: #ff4444;
        letter-spacing: 0.5px;
      }
      .cam-rec-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #ff4444;
        animation: rec-blink 1.2s ease-in-out infinite;
      }
      @keyframes rec-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }

      /* Resolution label */
      .cam-res {
        position: absolute;
        bottom: 3px;
        right: 5px;
        font-size: 5px;
        font-family: monospace;
        color: rgba(180, 190, 210, 0.45);
      }

      .cam-name {
        font-size: 8px;
        font-family: monospace;
        color: var(--ha-cyan);
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .cam-status {
        font-size: 6px;
        color: var(--ha-green);
        font-family: monospace;
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .cam-status-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--ha-green);
      }

      /* Title in cam view */
      .cam-title {
        text-align: center;
        color: var(--fx-font);
        flex-direction: column;
        font-size: 12px;
        font-weight: 300;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .cam-title .cam-count {
        font-size: 22px;
        font-weight: 600;
        display: block;
        margin-bottom: 2px;
      }

      /* Orbit ring styling in cam view */
      .cam-view [class*="orbit-"] {
        border-color: rgba(120, 135, 165, 0.1) !important;
        border-style: dashed !important;
      }
      .cam-view .orbit-ring {
        border-color: rgba(140, 155, 185, 0.14) !important;
        border-style: solid !important;
        border-width: 1px !important;
      }

      /* Decorative arc ring around cameras */
      .cam-view o-arc.cam-arc {
        --o-fill: rgba(120, 135, 165, 0.05);
        --o-stroke: rgba(140, 155, 185, 0.1);
      }

      /* ── Detail overlays (inset sheet — parent orbit stays visible) ── */
      .ha-detail-root {
        position: relative;
        width: 100%;
        height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: min(5.5vh, 40px) min(4vw, 28px);
        box-sizing: border-box;
      }
      .ha-detail-dim {
        position: absolute;
        inset: 0;
        background: rgba(15, 17, 23, 0.42);
        pointer-events: none;
      }
      .ha-detail-sheet {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: min(580px, 94vw);
        max-height: min(448px, 68vh);
        overflow: auto;
        background: #12151c;
        border: 1px solid var(--ha-border);
        border-radius: 11px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      }
      /* Alarm: more rows + zones — slightly taller sheet */
      .ha-detail-sheet.detail-view.ha-alarm-sheet {
        max-width: min(600px, 94vw);
        max-height: min(520px, 76vh);
      }

      /* ── Camera detail view (Level 3) ───────────────────── */
      .ha-detail-sheet.cam-detail {
        display: grid;
        grid-template-columns: 1.15fr 1fr;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
        padding: 14px 16px;
        font-family: monospace;
      }

      .cam-detail .cam-header {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .cam-detail .cam-header h1 {
        font-size: 16px;
        font-weight: 400;
        color: var(--ha-cyan);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .cam-detail .cam-header .cam-badge {
        margin-left: auto;
        font-size: 9px;
        padding: 3px 10px;
        border-radius: 20px;
        border: 1px solid var(--ha-green);
        color: var(--ha-green);
        letter-spacing: 1px;
      }

      .cam-detail .cam-preview {
        border-radius: 8px;
        border: 1px solid var(--ha-border);
        background: #161a22;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 118px;
        aspect-ratio: 16 / 9;
      }
      .cam-detail .cam-preview .cam-feed-bg {
        width: 100%;
        height: 100%;
        position: absolute;
        inset: 0;
      }
      .cam-detail .cam-preview .cam-rec {
        position: absolute;
        top: 10px;
        left: 14px;
        font-size: 9px;
      }
      .cam-detail .cam-preview .cam-overlay {
        position: absolute;
        bottom: 10px;
        left: 14px;
        right: 14px;
        display: flex;
        justify-content: space-between;
        font-size: 8px;
        color: var(--ha-muted);
      }

      .cam-detail .cam-sidebar {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .cam-detail .cam-panel {
        border: 1px solid var(--ha-border);
        border-radius: 8px;
        background: var(--ha-surface);
        padding: 12px;
      }
      .cam-detail .cam-panel h3 {
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--ha-muted);
        margin-bottom: 8px;
        font-weight: 400;
      }

      .cam-detail .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .cam-detail .stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .cam-detail .stat-label {
        font-size: 7px;
        color: var(--ha-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .cam-detail .stat-val {
        font-size: 12px;
        color: var(--ha-text);
      }
      .cam-detail .stat-val.accent { color: var(--ha-cyan); }
      .cam-detail .stat-val.green { color: var(--ha-green); }
      .cam-detail .stat-val.warn { color: #c9a85c; }

      .cam-detail .controls {
        grid-column: 1 / -1;
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .cam-detail .ctrl-btn {
        font-size: 8px;
        font-family: monospace;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 6px 16px;
        border-radius: 20px;
        border: 1px solid var(--ha-border);
        background: var(--ha-surface);
        color: var(--ha-text);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .cam-detail .ctrl-btn .dot {
        width: 5px; height: 5px;
        border-radius: 50%;
      }
      .cam-detail .ctrl-btn .dot.on { background: var(--ha-green); }
      .cam-detail .ctrl-btn .dot.off { background: var(--ha-muted); }

      .cam-detail .timeline {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .cam-detail .tl-item {
        display: flex;
        gap: 8px;
        align-items: baseline;
        font-size: 8px;
        color: var(--ha-text);
      }
      .cam-detail .tl-time {
        color: var(--ha-muted);
        min-width: 45px;
      }
      .cam-detail .tl-type {
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 7px;
        letter-spacing: 0.5px;
      }
      .cam-detail .tl-type.motion { background: rgba(91,122,173,0.12); color: #a8bdd4; }
      .cam-detail .tl-type.person { background: rgba(77,157,111,0.12); color: var(--ha-green); }
      .cam-detail .tl-type.sound { background: rgba(200,175,95,0.12); color: #c9b878; }

      /* ── Generic section view (Devices, Rooms, Scenes, Alarm) ── */
      .section-view {
        width: 100%; height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .section-view .gravity-spot { --o-force: 340px; }
      .section-view .satellite { border: none; overflow: visible; }
      .section-view .capsule { overflow: visible; }
      /* Hub sections (devices, rooms, scenes): same orbit chrome as Cameras; alarm uses ha-detail-root */
      .section-view.cam-view [class*="orbit-"] {
        border-color: rgba(120, 135, 165, 0.1) !important;
        border-style: dashed !important;
      }
      .section-view.cam-view .orbit-2.ring,
      .section-view.cam-view .orbit-4.orbit-ring {
        border-color: rgba(140, 155, 185, 0.14) !important;
        border-style: solid !important;
        border-width: 1px !important;
      }
      .section-view.cam-view o-arc.cam-arc {
        --o-fill: rgba(120, 135, 165, 0.05);
        --o-stroke: rgba(140, 155, 185, 0.1);
      }

      /* Section card (device, room, scene items) */
      .sec-card {
        width: 120px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--ha-border);
        background: var(--ha-surface);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font-family: monospace;
        transition: border-color 0.2s;
        cursor: zoom-in;
      }
      .sec-card:hover {
        border-color: rgba(255,255,255,0.14);
      }
      .sec-card .sec-icon {
        font-size: 20px;
        margin-bottom: 2px;
      }
      .sec-card .sec-icon svg { width: 20px; height: 20px; }
      .sec-card .sec-name {
        font-size: 7px;
        color: var(--ha-cyan);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        text-align: center;
      }
      .sec-card .sec-state {
        font-size: 8px;
        color: var(--ha-text);
      }
      .sec-card .sec-meta {
        font-size: 6px;
        color: var(--ha-muted);
      }
      .sec-card .sec-state.on { color: var(--ha-green); }
      .sec-card .sec-state.off { color: var(--ha-muted); }
      .sec-card .sec-state.warn { color: #c9a85c; }
      .sec-card .sec-state.active { color: var(--ha-cyan); }

      /* Section title at center */
      .sec-title {
        text-align: center;
        color: var(--fx-font);
        flex-direction: column;
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: monospace;
      }
      .sec-title .sec-count {
        font-size: 20px;
        font-weight: 600;
        display: block;
        margin-bottom: 2px;
      }

      /* ── Detail panel (reused across device/room/scene detail) ── */
      .ha-detail-sheet.detail-view {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        gap: 11px;
        padding: 14px 16px;
        font-family: monospace;
      }
      .detail-view .detail-header {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .detail-view .detail-header h1 {
        font-size: 14px;
        font-weight: 400;
        color: var(--ha-cyan);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .detail-view .detail-header .detail-badge {
        margin-left: auto;
        font-size: 8px;
        padding: 3px 10px;
        border-radius: 20px;
        border: 1px solid;
        letter-spacing: 1px;
      }
      .detail-view .detail-header .detail-badge.on { border-color: var(--ha-green); color: var(--ha-green); }
      .detail-view .detail-header .detail-badge.off { border-color: var(--ha-muted); color: var(--ha-muted); }
      .detail-view .detail-header .detail-badge.armed { border-color: #ff5252; color: #ff5252; }

      .detail-view .d-panel {
        border: 1px solid var(--ha-border);
        border-radius: 8px;
        background: var(--ha-surface);
        padding: 12px;
      }
      .detail-view .d-panel h3 {
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--ha-muted);
        margin-bottom: 8px;
        font-weight: 400;
      }
      .detail-view .d-panel .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .detail-view .d-panel .stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .detail-view .d-panel .stat-label {
        font-size: 7px;
        color: var(--ha-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .detail-view .d-panel .stat-val {
        font-size: 12px;
        color: var(--ha-text);
      }
      .detail-view .d-panel .stat-val.accent { color: var(--ha-cyan); }
      .detail-view .d-panel .stat-val.green { color: var(--ha-green); }
      .detail-view .d-panel .stat-val.warn { color: #c9a85c; }
      .detail-view .d-panel .stat-val.red { color: #ff5252; }

      .detail-view .d-panel.full { grid-column: 1 / -1; }

      /* Alarm specific */
      .alarm-zones { display: flex; flex-direction: column; gap: 6px; }
      .alarm-zone {
        display: flex; align-items: center; gap: 8px;
        font-size: 9px; color: var(--ha-text);
        padding: 6px 8px;
        border: 1px solid var(--ha-border);
        border-radius: 6px;
      }
      .alarm-zone .az-dot { width: 6px; height: 6px; border-radius: 50%; }
      .alarm-zone .az-dot.armed { background: var(--ha-green); }
      .alarm-zone .az-dot.disarmed { background: var(--ha-muted); }
      .alarm-zone .az-dot.triggered { background: #ff5252; animation: rec-blink 1s infinite; }
      .alarm-zone .az-status { margin-left: auto; font-size: 7px; color: var(--ha-muted); text-transform: uppercase; letter-spacing: 0.5px; }

      /* Scene activation bar */
      .scene-bar {
        display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
      }
      .scene-dev {
        font-size: 7px; padding: 3px 8px; border-radius: 12px;
        border: 1px solid var(--ha-border); color: var(--ha-text);
      }
      .scene-dev.active { border-color: var(--ha-green); color: var(--ha-green); }

      /* ── Responsive ──────────────────────────────────────── */
      @media (max-width: 768px) {
        /* Orbit views: reduce force so items stay on screen */
        .cam-view .gravity-spot { --o-force: 180px; }
        .section-view .gravity-spot { --o-force: 180px; }

        /* Camera cards: smaller to fit orbit */
        .cam-card { width: 100px; height: 80px; gap: 4px; }
        .cam-feed { width: 85px; height: 48px; }
        .cam-name { font-size: 6px; }
        .cam-status { font-size: 5px; }
        .cam-rec { font-size: 5px; }
        .cam-res { font-size: 4px; }
        .cam-title { font-size: 9px; }
        .cam-title .cam-count { font-size: 16px; }

        /* Camera detail: single column */
        .ha-detail-sheet.cam-detail {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto 1fr auto;
          gap: 10px;
          padding: 12px;
          max-height: min(520px, 78vh);
        }
        .cam-detail .cam-header h1 { font-size: 12px; }
        .cam-detail .cam-preview { min-height: 100px; aspect-ratio: 16 / 9; }
        .cam-detail .cam-preview .cam-rec { font-size: 8px; top: 8px; left: 10px; }
        .cam-detail .cam-preview .cam-overlay { font-size: 7px; bottom: 8px; left: 10px; right: 10px; }
        .cam-detail .cam-panel { padding: 10px; }
        .cam-detail .cam-panel h3 { font-size: 7px; }
        .cam-detail .stat-label { font-size: 6px; }
        .cam-detail .stat-val { font-size: 11px; }
        .cam-detail .tl-item { font-size: 7px; }
        .cam-detail .ctrl-btn { font-size: 7px; padding: 5px 12px; }

        /* Section cards: smaller */
        .sec-card { width: 90px; padding: 8px; }
        .sec-card .sec-icon { font-size: 16px; }
        .sec-card .sec-icon svg { width: 16px; height: 16px; }
        .sec-card .sec-name { font-size: 6px; }
        .sec-card .sec-state { font-size: 7px; }

        const idx = menu ? menuRouteOrder.indexOf(menu.getAttribute('data-to')) : -1
        document.querySelectorAll('.orbit-11 .selector').forEach((arc, i) => {
          arc.classList.toggle('active', i === idx && idx >= 0)
        })
      })
    </script>
</body>
</html>
