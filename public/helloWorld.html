<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zumly - Hello World (drivers demo)</title>
    <link rel="stylesheet" href="/dist/zumly.css" />
    <style>
 body {
  margin: 0;
  padding: 0;
}
.mount {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow: hidden;
}

.example {
  width: 100%;
  height: 100%;
  position: relative;
}

.view {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: 24px;
  background: linear-gradient(180deg, rgba(11, 16, 32, 0.9), rgba(11, 16, 32, 0.55));
  color: #e8ecff;
}

.muted {
  opacity: 0.8;
}

.card {
  margin-top: 16px;
  padding: 16px 18px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(226, 186, 26, 0.65);
  width: fit-content;
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.card.zoom-me {
  cursor: zoom-in;
}
.world{
  width: 250px;
  height: 250px;
  top: -5px
}
.o {
  border: 3px solid #ffcc00
}
.hello {
  font-size: 4em;
  text-align: center;
  font-family: arial;
  font-weight: bold;
   width: 400px;
  height: 200px;
}

.driver-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 10px 14px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        align-items: center;
      }

      .driver-bar label {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
      }

    </style>
  </head>

  <body>
    <div class="driver-bar">
      <span style="opacity: 0.9">Drivers:</span>
      <label><input type="radio" name="driver" value="css" checked /> CSS</label>
      <label><input type="radio" name="driver" value="waapi" /> WAAPI</label>
      <label><input type="radio" name="driver" value="anime" /> Anime.js</label>
      <label><input type="radio" name="driver" value="gsap" /> GSAP</label>
      <label><input type="radio" name="driver" value="motion" /> Motion</label>
      <label><input type="radio" name="driver" value="none" /> None</label>
      <span style="opacity: 0.5; margin-left: 12px">|</span>
      <label><input type="checkbox" id="effects-toggle" /> Effects</label>
      <span id="effects-controls" style="display:none; gap:10px; align-items:center">
        <label style="font-size:12px">Blur <input type="range" id="blur-prev" min="0" max="20" value="3" style="width:60px"><span id="blur-prev-val">3</span>px / <input type="range" id="blur-last" min="0" max="20" value="8" style="width:60px"><span id="blur-last-val">8</span>px</label>
        <label style="font-size:12px">Bright <input type="range" id="bright-prev" min="0" max="100" value="70" style="width:60px"><span id="bright-prev-val">0.7</span> / <input type="range" id="bright-last" min="0" max="100" value="40" style="width:60px"><span id="bright-last-val">0.4</span></label>
        <label style="font-size:12px">Saturate <input type="range" id="sat-last" min="0" max="100" value="0" style="width:60px"><span id="sat-last-val">0</span>%</label>
      </span>
      <label><input type="checkbox" id="threshold-toggle" /> Elastic zoom</label>
      <label style="font-size:12px">Parallax <input type="range" id="parallax-slider" min="0" max="100" value="0" style="width:70px"><span id="parallax-val">0</span></label>
      <label style="font-size:12px">Stagger <input type="range" id="stagger-slider" min="0" max="300" value="0" style="width:70px"><span id="stagger-val">0</span>ms</label>
    </div>

    <div class="mount">
      <div class="example zumly-canvas"></div>
    </div>

    <!-- Optional libraries for extra animation drivers -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/motion@11/dist/motion.min.js" crossorigin="anonymous"></script>
    <script src="/dist/zumly.js"></script>
    <script>
      const ZumlyLib = window.Zumly || globalThis.Zumly
      if (typeof ZumlyLib !== 'function') {
        throw new Error('Zumly constructor not found.')
      }

      const hello = `
        <div class="z-view hello">
          H E L L O <br>
          W <span class='zoom-me o' data-to='world'>O</span> R L D!
        </div>
      `

      const world = `
        <div class="z-view world">
          <img class="world" src="https://raw.githubusercontent.com/zumly/website/gh-pages/images/world.png"/>
        </div>
      `

      const mountParentEl = document.querySelector('.mount')

      function readDriver () {
        const r = document.querySelector('input[name="driver"]:checked')
        return r ? r.value : 'css'
      }

      function startApp () {
        const driver = readDriver()
        if (mountParentEl) mountParentEl.innerHTML = ''

        const canvas = document.createElement('div')
        canvas.className = 'example zumly-canvas'
        if (mountParentEl) mountParentEl.appendChild(canvas)

        const useEffects = document.getElementById('effects-toggle').checked
        const useThreshold = document.getElementById('threshold-toggle').checked

        const transitions = {
            driver,
            duration: driver === 'none' ? '0s' : '700ms',
            ease: 'ease-in-out',
            cover: 'height',
        }
        if (useEffects) {
          const bp = document.getElementById('blur-prev').value
          const bl = document.getElementById('blur-last').value
          const brp = (document.getElementById('bright-prev').value / 100).toFixed(2)
          const brl = (document.getElementById('bright-last').value / 100).toFixed(2)
          const sl = document.getElementById('sat-last').value
          transitions.effects = [
            `blur(${bp}px) brightness(${brp})`,
            `blur(${bl}px) brightness(${brl}) saturate(${sl}%)`
          ]
        }
        if (useThreshold) {
          transitions.threshold = { enabled: true, duration: 400, commitAt: 0.4 }
        }
        const parallaxVal = document.getElementById('parallax-slider').value / 100
        if (parallaxVal > 0) {
          transitions.parallax = parallaxVal
        }
        const staggerVal = parseInt(document.getElementById('stagger-slider').value, 10)
        if (staggerVal > 0) {
          transitions.stagger = staggerVal
        }

        const app = new ZumlyLib({
          mount: '.example',
          initialView: 'hello',
          preload: ['world'],
          views: { hello, world },
          transitions,
          debug: false,
        })

        app.init()
      }

      document.querySelectorAll('input[name="driver"]').forEach((radio) => {
        radio.addEventListener('change', startApp)
      })
      const effectsToggle = document.getElementById('effects-toggle')
      const effectsControls = document.getElementById('effects-controls')

      effectsToggle.addEventListener('change', () => {
        effectsControls.style.display = effectsToggle.checked ? 'inline-flex' : 'none'
        startApp()
      })

      // Update slider labels and restart on change
      ;['blur-prev', 'blur-last', 'bright-prev', 'bright-last', 'sat-last'].forEach(id => {
        const el = document.getElementById(id)
        el.addEventListener('input', () => {
          const valEl = document.getElementById(id + '-val')
          if (id.startsWith('bright')) {
            valEl.textContent = (el.value / 100).toFixed(1)
          } else if (id.startsWith('sat')) {
            valEl.textContent = el.value
          } else {
            valEl.textContent = el.value
          }
          startApp()
        })
      })

      document.getElementById('threshold-toggle').addEventListener('change', startApp)

      const parallaxSlider = document.getElementById('parallax-slider')
      parallaxSlider.addEventListener('input', () => {
        document.getElementById('parallax-val').textContent = (parallaxSlider.value / 100).toFixed(2)
        startApp()
      })

      const staggerSlider = document.getElementById('stagger-slider')
      staggerSlider.addEventListener('input', () => {
        document.getElementById('stagger-val').textContent = staggerSlider.value
        startApp()
      })

      startApp()
    </script>
  </body>
</html>
