<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zumly dev demo</title>
    <link rel="stylesheet" href="/dist/zumly.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(900px 500px at 20% 0%, rgba(226, 186, 26, 0.18), transparent 55%),
          radial-gradient(900px 500px at 90% 20%, rgba(108, 99, 255, 0.22), transparent 50%),
          linear-gradient(180deg, #070a14, #0b1020 60%, #070a14);
      }
      .example.zumly-canvas {
        background: transparent;
      }
      .view {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 24px;
        background: linear-gradient(180deg, rgba(11, 16, 32, 0.78), rgba(11, 16, 32, 0.55));
        color: #e8ecff;
      }
      .card {
        margin-top: 16px;
        padding: 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(226, 186, 26, 0.65);
        width: fit-content;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
      }
      .card.zoom-me:hover {
        transform: translateY(-2px) scale(1.02);
        border-color: rgba(226, 186, 26, 0.95);
        background: rgba(255, 255, 255, 0.08);
      }
      .card.zoom-me {
        cursor: zoom-in;
      }
      .muted {
        opacity: 0.8;
      }
      .row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        align-items: flex-start;
      }
      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .grid3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }
      .kpi {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(226, 186, 26, 0.35);
        background: rgba(255, 255, 255, 0.04);
      }
      .kpi strong {
        display: block;
        font-size: 20px;
        letter-spacing: -0.02em;
      }
      .thumb {
        width: 100%;
        height: 90px;
        border-radius: 12px;
        border: 1px solid rgba(108, 99, 255, 0.22);
        background: linear-gradient(135deg, rgba(108, 99, 255, 0.18), rgba(226, 186, 26, 0.12));
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(226, 186, 26, 0.35);
        background: rgba(255, 255, 255, 0.04);
      }
      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(226, 186, 26, 0.28);
        background: rgba(255, 255, 255, 0.03);
      }
      .switch {
        width: 46px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid rgba(226, 186, 26, 0.35);
        background: rgba(255, 255, 255, 0.06);
        position: relative;
        flex: 0 0 auto;
      }
      .switch::after {
        content: "";
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: rgba(226, 186, 26, 0.92);
        position: absolute;
        top: 50%;
        left: 4px;
        transform: translateY(-50%);
        transition: left 180ms ease;
      }
      .switch.on::after {
        left: 22px;
      }
      .driver-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        padding: 10px 16px;
        background: rgba(11, 16, 32, 0.95);
        border-bottom: 1px solid rgba(226, 186, 26, 0.4);
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .driver-bar label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        color: #e8ecff;
      }
      .driver-bar input[type="radio"] {
        accent-color: rgba(226, 186, 26, 1);
      }
      .driver-bar select,
      .driver-bar input[type="range"] {
        margin-left: 6px;
      }
      .driver-bar .control {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      #demo-container {
        position: absolute;
        top: 52px;
        left: 0;
        right: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="driver-bar">
      <span class="muted">Driver:</span>
      <label><input type="radio" name="driver" value="css" checked> CSS</label>
      <label><input type="radio" name="driver" value="waapi"> WAAPI</label>
      <label><input type="radio" name="driver" value="anime"> Anime.js</label>
      <label><input type="radio" name="driver" value="gsap"> GSAP</label>
      <label><input type="radio" name="driver" value="motion"> Motion</label>
      <label><input type="radio" name="driver" value="none"> None</label>

      <span class="muted">Cover:</span>
      <select id="cover" style="background: rgba(255,255,255,0.05); color: #e8ecff; border: 1px solid rgba(226,186,26,0.35); border-radius: 10px; padding: 6px 10px;">
        <option value="width">width</option>
        <option value="height" selected>height</option>
      </select>

      <span class="muted">Duration:</span>
      <div class="control">
        <input id="duration" type="range" min="200" max="1200" step="50" value="700" />
        <span id="durationLabel" class="pill muted" style="margin-left: 0;">700ms</span>
      </div>
    </div>
    <div id="demo-container">
      <div class="example zumly-canvas"></div>
    </div>

    <!-- Optional: load to try anime, gsap or motion driver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/motion@11/dist/motion.min.js" crossorigin="anonymous"></script>
    <script src="/dist/zumly.js"></script>
    <script>
      const ZumlyLib = window.Zumly || globalThis.Zumly
      if (typeof ZumlyLib !== 'function') {
        throw new Error('Zumly constructor not found.')
      }

      const home = `
        <div class="z-view view" style="width: 820px; height: 420px">
          <div class="row" style="justify-content: space-between;">
            <div>
              <h1 style="margin: 0 0 8px;">Zumly x Motion-like Demo</h1>
              <div class="muted">Zoom transitions with interchangeable drivers (CSS / WAAPI / Anime / GSAP / Motion / None).</div>
            </div>
            <div class="pill">
              <span style="width:10px;height:10px;border-radius:50%;background: rgba(226,186,26,0.95);display:inline-block;"></span>
              <span class="muted">Tip: click outside to zoom out</span>
            </div>
          </div>

          <div class="row" style="margin-top: 18px;">
            <div class="card zoom-me" style="width: 340px;" data-to="dashboard">
              <div style="font-size: 14px;" class="muted">Overview</div>
              <div style="font-size: 28px; font-weight: 750; letter-spacing: -0.03em;">Dashboard</div>
              <div class="muted" style="margin-top: 8px;">KPIs and navigation</div>
            </div>
            <div class="card zoom-me" style="width: 320px;" data-to="gallery">
              <div style="font-size: 14px;" class="muted">Browse</div>
              <div style="font-size: 28px; font-weight: 750; letter-spacing: -0.03em;">Gallery</div>
              <div class="muted" style="margin-top: 8px;">Zoom into items</div>
            </div>
          </div>

          <div class="grid3" style="margin-top: 18px;">
            <div class="kpi">
              <strong>48%</strong>
              <div class="muted">Interaction latency</div>
            </div>
            <div class="kpi">
              <strong>1.7×</strong>
              <div class="muted">Perceived speed</div>
            </div>
            <div class="kpi">
              <strong>0.6s</strong>
              <div class="muted">Animation budget</div>
            </div>
          </div>
        </div>
      `

      const dashboard = `
        <div class="z-view view" style="width: 860px; height: 460px">
          <div class="row" style="justify-content: space-between;">
            <div>
              <h2 style="margin: 0 0 6px;">Dashboard</h2>
              <div class="muted">Pick a card to zoom. Switch drivers to compare.</div>
            </div>
            <div class="pill"><span class="muted">Back</span></div>
          </div>

          <div class="grid2" style="margin-top: 18px;">
            <div class="card zoom-me" data-to="details" style="width: 360px;">
              <div class="muted" style="font-size: 14px;">Active session</div>
              <div style="font-size: 22px; font-weight: 750;">Analytics</div>
              <div class="muted" style="margin-top: 8px;">Click for details</div>
            </div>
            <div class="card zoom-me" data-to="settings" style="width: 360px;">
              <div class="muted" style="font-size: 14px;">Tune experience</div>
              <div style="font-size: 22px; font-weight: 750;">Settings</div>
              <div class="muted" style="margin-top: 8px;">Drivers + preferences</div>
            </div>
          </div>

          <div style="margin-top: 16px;" class="row">
            <div class="kpi" style="flex: 1 1 220px;">
              <strong>9.2ms</strong>
              <div class="muted">Transform prep</div>
            </div>
            <div class="kpi" style="flex: 1 1 220px;">
              <strong>60fps</strong>
              <div class="muted">Target frame rate</div>
            </div>
            <div class="card zoom-me" style="width: 220px; margin-top: 0;" data-to="home">
              <div class="muted">Return</div>
              <div style="font-weight: 750; font-size: 18px;">Home</div>
            </div>
          </div>
        </div>
      `

      const gallery = `
        <div class="z-view view" style="width: 900px; height: 520px">
          <div class="row" style="justify-content: space-between;">
            <div>
              <h2 style="margin: 0 0 6px;">Gallery</h2>
              <div class="muted">Zoom into a “thumbnail”.</div>
            </div>
            <div class="card zoom-me" style="width: 180px; margin-top: 0;" data-to="home">
              <div class="muted">Back</div>
              <div style="font-weight: 750; font-size: 18px;">Home</div>
            </div>
          </div>

          <div class="grid3" style="margin-top: 18px;">
            <div class="card zoom-me" style="width: 250px;" data-to="details">
              <div class="thumb"></div>
              <div style="margin-top: 10px;" class="muted">Collection A</div>
            </div>
            <div class="card zoom-me" style="width: 250px;" data-to="details">
              <div class="thumb" style="background: linear-gradient(135deg, rgba(226,186,26,0.18), rgba(108,99,255,0.12));"></div>
              <div style="margin-top: 10px;" class="muted">Collection B</div>
            </div>
            <div class="card zoom-me" style="width: 250px;" data-to="details">
              <div class="thumb" style="background: linear-gradient(135deg, rgba(108,99,255,0.18), rgba(255,255,255,0.07));"></div>
              <div style="margin-top: 10px;" class="muted">Collection C</div>
            </div>
          </div>

          <div class="row" style="margin-top: 18px;">
            <div class="kpi" style="flex: 1 1 280px;">
              <strong>Prefetch</strong>
              <div class="muted">Hover/click targets are resolved ahead of time.</div>
            </div>
            <div class="kpi" style="flex: 1 1 280px;">
              <strong>Zoom-out</strong>
              <div class="muted">Click outside or use ArrowLeft/Down.</div>
            </div>
          </div>
        </div>
      `

      const details = `
        <div class="z-view view" style="width: 820px; height: 560px">
          <div class="row" style="justify-content: space-between;">
            <div>
              <h2 style="margin: 0 0 6px;">Details</h2>
              <div class="muted">This view is a good stress-test for animation.</div>
            </div>
            <div class="card zoom-me" style="width: 180px; margin-top: 0;" data-to="dashboard">
              <div class="muted">Back</div>
              <div style="font-weight: 750; font-size: 18px;">Dashboard</div>
            </div>
          </div>

          <div class="card" style="margin-top: 18px; width: 100%; padding: 18px;">
            <div class="thumb" style="height: 220px; border-radius: 16px; background: linear-gradient(135deg, rgba(226,186,26,0.20), rgba(108,99,255,0.15));"></div>
            <div class="row" style="margin-top: 16px;">
              <div class="kpi" style="flex: 1 1 220px;"><strong>12.4k</strong><div class="muted">Views</div></div>
              <div class="kpi" style="flex: 1 1 220px;"><strong>2.1k</strong><div class="muted">Saves</div></div>
              <div class="kpi" style="flex: 1 1 220px;"><strong>97%</strong><div class="muted">Retention</div></div>
            </div>
          </div>

          <div class="grid2" style="margin-top: 18px;">
            <div class="card zoom-me" data-to="settings" style="width: 380px;">
              <div class="muted" style="font-size: 14px;">Next</div>
              <div style="font-size: 22px; font-weight: 750;">Preferences</div>
              <div class="muted" style="margin-top: 8px;">Switch drivers + cover</div>
            </div>
            <div class="card zoom-me" data-to="home" style="width: 380px;">
              <div class="muted" style="font-size: 14px;">Start over</div>
              <div style="font-size: 22px; font-weight: 750;">Home</div>
              <div class="muted" style="margin-top: 8px;">Hero + navigation</div>
            </div>
          </div>
        </div>
      `

      const settings = `
        <div class="z-view view" style="width: 760px; height: 460px">
          <div class="row" style="justify-content: space-between;">
            <div>
              <h2 style="margin: 0 0 6px;">Settings</h2>
              <div class="muted">This is just visual; driver options are on top.</div>
            </div>
            <div class="pill"><span class="muted">Instant state supported</span></div>
          </div>

          <div class="grid2" style="margin-top: 18px;">
            <div class="toggle">
              <div>
                <div style="font-weight: 700;">Reduced motion</div>
                <div class="muted" style="font-size: 12px;">Prefer 'none' driver</div>
              </div>
              <div class="switch on"></div>
            </div>
            <div class="toggle">
              <div>
                <div style="font-weight: 700;">High contrast</div>
                <div class="muted" style="font-size: 12px;">Visual polish</div>
              </div>
              <div class="switch"></div>
            </div>
          </div>

          <div class="grid2" style="margin-top: 14px;">
            <div class="toggle">
              <div>
                <div style="font-weight: 700;">SnapDOM-ready</div>
                <div class="muted" style="font-size: 12px;">Future plugin path</div>
              </div>
              <div class="switch on"></div>
            </div>
            <div class="toggle">
              <div>
                <div style="font-weight: 700;">Preload graph</div>
                <div class="muted" style="font-size: 12px;">Cache view sources</div>
              </div>
              <div class="switch on"></div>
            </div>
          </div>

          <div class="row" style="margin-top: 18px;">
            <div class="card zoom-me" style="width: 300px; margin-top: 0;" data-to="dashboard">
              <div class="muted">Back</div>
              <div style="font-weight: 750; font-size: 18px;">Dashboard</div>
            </div>
            <div class="card zoom-me" style="width: 300px; margin-top: 0;" data-to="home">
              <div class="muted">Exit</div>
              <div style="font-weight: 750; font-size: 18px;">Home</div>
            </div>
          </div>
        </div>
      `

      const container = document.getElementById('demo-container')

      function getDriver () {
        const r = document.querySelector('input[name="driver"]:checked')
        return r ? r.value : 'css'
      }

      function getCover () {
        const s = document.getElementById('cover')
        return s ? s.value : 'height'
      }

      function getDuration () {
        const r = document.getElementById('duration')
        const label = document.getElementById('durationLabel')
        const ms = r ? parseInt(r.value, 10) : 700
        if (label) label.textContent = `${ms}ms`
        return ms
      }

      function startApp () {
        const driver = getDriver()
        const cover = getCover()
        const durationMs = getDuration()
        container.innerHTML = ''
        const canvas = document.createElement('div')
        canvas.className = 'example zumly-canvas'
        container.appendChild(canvas)

        const app = new ZumlyLib({
          mount: '.example',
          initialView: 'home',
          preload: ['dashboard', 'gallery', 'details', 'settings'],
          views: { home, dashboard, gallery, details, settings },
          transitions: {
            driver: driver,
            duration: driver === 'none' ? '0s' : `${durationMs}ms`,
            ease: 'ease-in-out',
            cover: cover,
          },
          debug: false,
        })
        app.init()
      }

      document.querySelectorAll('input[name="driver"]').forEach((radio) => {
        radio.addEventListener('change', startApp)
      })

      const coverEl = document.getElementById('cover')
      if (coverEl) coverEl.addEventListener('change', startApp)

      const durationEl = document.getElementById('duration')
      if (durationEl) durationEl.addEventListener('change', startApp)

      startApp()
    </script>
  </body>
</html>
