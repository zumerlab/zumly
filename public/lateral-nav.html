<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zumly - Same-Level (Lateral) Navigation</title>
    <link rel="stylesheet" href="/dist/zumly.css" />
    <style>
      body { margin: 0; padding: 0; }
      .mount {
        position: absolute;
        top: 100px;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
      }
      .example { width: 100%; height: 100%; position: relative; }
      .view {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 24px;
        background: linear-gradient(180deg, rgba(11, 16, 32, 0.9), rgba(11, 16, 32, 0.55));
        color: #e8ecff;
      }
      .card {
        margin-top: 16px;
        padding: 16px 18px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(226, 186, 26, 0.65);
        width: fit-content;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
        cursor: zoom-in;
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 12px 14px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        align-items: center;
      }
      .nav-bar button {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        cursor: pointer;
        font-size: 0.85rem;
      }
      .nav-bar button:hover { background: rgba(255, 255, 255, 0.2); }
      .nav-bar .info { opacity: 0.9; font-size: 0.9rem; }
      .nav-bar .hint { opacity: 0.6; font-size: 0.8rem; max-width: 420px; }
    </style>
  </head>
  <body>
    <div class="nav-bar">
      <span><strong>Same-level (lateral) navigation</strong></span>
      <button onclick="app.goTo('detailA', { mode: 'depth' })">drill to A</button>
      <button onclick="app.goTo('detailB', { mode: 'lateral' })">lateral to B</button>
      <button onclick="app.goTo('detailA', { mode: 'lateral' })">lateral to A</button>
      <button onclick="app.goTo('nested', { mode: 'depth' })">drill to Nested</button>
      <button onclick="app.back()">back()</button>
      <span class="info" id="status">—</span>
      <span class="hint">Same level = swap view at current depth without zooming out. back() undoes lateral first, then zooms out.</span>
    </div>

    <div class="mount">
      <div class="example zumly-canvas"></div>
    </div>

    <script src="/dist/zumly.js"></script>
    <script>
      const ZumlyLib = window.Zumly || globalThis.Zumly
      if (typeof ZumlyLib !== 'function') throw new Error('Zumly constructor not found.')

      const home = `
        <div class="z-view view">
          <h2>Home</h2>
          <p>Root view. Use "drill to A" or click a card to go deeper.</p>
          <div class="card zoom-me" data-to="detailA">Detail A (click)</div>
          <div class="card zoom-me" data-to="detailB">Detail B (click)</div>
        </div>
      `
      const detailA = `
        <div class="z-view view">
          <h2>Detail A</h2>
          <p>At depth 2. Use lateral buttons to switch to B without going back to Home.</p>
          <div class="card zoom-me" data-to="nested">Nested (click)</div>
        </div>
      `
      const detailB = `
        <div class="z-view view">
          <h2>Detail B</h2>
          <p>Sibling of A at same depth. back() returns to A (or Home if no lateral history).</p>
        </div>
      `
      const nested = `
        <div class="z-view view">
          <h2>Nested</h2>
          <p>Depth 3. back() goes to A.</p>
        </div>
      `

      const app = new ZumlyLib({
        mount: '.example',
        initialView: 'home',
        views: { home, detailA, detailB, nested },
        transitions: { driver: 'css', duration: '400ms', ease: 'ease-in-out', cover: 'width' },
      })

      function updateStatus () {
        const el = document.getElementById('status')
        if (el && app) el.textContent = `View: ${app.getCurrentViewName()} | Level: ${app.getZoomLevel()}`
      }

      app.init().then(() => {
        updateStatus()
        setInterval(updateStatus, 200)
      })
    </script>
  </body>
</html>
