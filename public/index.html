<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zumly dev demo</title>
    <link rel="stylesheet" href="/dist/zumly.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .view {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 24px;
        background: #0b102043;
        color: #e8ecff;
      }
      .card {
        margin-top: 16px;
        padding: 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(226, 186, 26, 1);
        width: fit-content;
      }
      .card.zoom-me {
        cursor: zoom-in;
      }
      .muted {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="example zumly-canvas"></div>

    <script src="/dist/zumly.js"></script>
    <script>
      const ZumlyLib = window.Zumly || globalThis.Zumly
      if (typeof ZumlyLib !== 'function') {
        throw new Error(`Zumly constructor not found. window.Zumly is: ${String(window.Zumly)}`)
      }

      const hello = `
        <div class="z-view view" data-name="hello" style="width: 600px; height: 250px">
          <h1>Zumly demo</h1>
          <p class="muted">Click the card to zoom into the next view.</p>
          <div class="card zoom-me" data-to="world" data-to-cover="height">Zoom to World</div>
        </div>
      `

      const world = `
        <div class="z-view view" data-name="world" style="width: 400px; height: 750px">
          <h1>World</h1>
          <p class="muted">Use zoom-out (click outside or ArrowLeft/Down).</p>
          <div class="card zoom-me" data-to="hello">Back to Hello</div>
        </div>
      `

      const app = new ZumlyLib({
        mount: '.example',
        initialView: 'hello',
        preload: ['world'],
        views: { hello, world },
        transitions: { duration: '700ms', ease: 'ease-in-out', cover: 'height' },
        debug: false,
      })

      app.init()
    </script>
  </body>
</html>
