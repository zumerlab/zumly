<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zumly dev demo</title>
    <link rel="stylesheet" href="/dist/zumly.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .view {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 24px;
        background: #0b102043;
        color: #e8ecff;
      }
      .card {
        margin-top: 16px;
        padding: 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(226, 186, 26, 1);
        width: fit-content;
      }
      .card.zoom-me {
        cursor: zoom-in;
      }
      .muted {
        opacity: 0.8;
      }
      .driver-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        padding: 10px 16px;
        background: rgba(11, 16, 32, 0.95);
        border-bottom: 1px solid rgba(226, 186, 26, 0.4);
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .driver-bar label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        color: #e8ecff;
      }
      .driver-bar input[type="radio"] {
        accent-color: rgba(226, 186, 26, 1);
      }
      #demo-container {
        position: absolute;
        top: 52px;
        left: 0;
        right: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="driver-bar">
      <span class="muted">Transition driver:</span>
      <label><input type="radio" name="driver" value="css" checked> CSS</label>
      <label><input type="radio" name="driver" value="waapi"> WAAPI</label>
      <label><input type="radio" name="driver" value="none"> None</label>
    </div>
    <div id="demo-container">
      <div class="example zumly-canvas"></div>
    </div>

    <script src="/dist/zumly.js"></script>
    <script>
      const ZumlyLib = window.Zumly || globalThis.Zumly
      if (typeof ZumlyLib !== 'function') {
        throw new Error('Zumly constructor not found.')
      }

      const hello = `
        <div class="z-view view" data-name="hello" style="width: 600px; height: 250px">
          <h1>Zumly demo</h1>
          <p class="muted">Click the card to zoom. Switch driver in the bar above.</p>
          <div class="card zoom-me" data-to="world" data-to-cover="height">Zoom to World</div>
        </div>
      `

      const world = `
        <div class="z-view view" data-name="world" style="width: 400px; height: 750px">
          <h1>World</h1>
          <p class="muted">Use zoom-out (click outside or ArrowLeft/Down).</p>
          <div class="card zoom-me" data-to="hello">Back to Hello</div>
        </div>
      `

      const container = document.getElementById('demo-container')

      function getDriver () {
        const r = document.querySelector('input[name="driver"]:checked')
        return r ? r.value : 'css'
      }

      function startApp () {
        const driver = getDriver()
        container.innerHTML = ''
        const canvas = document.createElement('div')
        canvas.className = 'example zumly-canvas'
        container.appendChild(canvas)

        const app = new ZumlyLib({
          mount: '.example',
          initialView: 'hello',
          preload: ['world'],
          views: { hello, world },
          transitions: {
            driver: driver,
            duration: driver === 'none' ? '0s' : '700ms',
            ease: 'ease-in-out',
            cover: 'height',
          },
          debug: false,
        })
        app.init()
      }

      document.querySelectorAll('input[name="driver"]').forEach((radio) => {
        radio.addEventListener('change', startApp)
      })

      startApp()
    </script>
  </body>
</html>
