<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zumly - Mercedes-Benz Truck Assembly Plant</title>
    <link rel="stylesheet" href="/dist/zumly.css" />
    <style>
      :root {
        --mb-black: #0d0d0d;
        --mb-dark: #1a1a2e;
        --mb-surface: rgba(255, 255, 255, 0.05);
        --mb-border: rgba(255, 255, 255, 0.08);
        --mb-silver: #c4c4c4;
        --mb-accent: #00adef;
        --mb-accent-dim: rgba(0, 173, 239, 0.15);
        --mb-green: #2ecc71;
        --mb-yellow: #f1c40f;
        --mb-red: #e74c3c;
        --mb-orange: #e67e22;
        --mb-text: #e8ecf4;
        --mb-muted: rgba(232, 236, 244, 0.5);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: var(--mb-black);
        color: var(--mb-text);
        overflow: hidden;
      }

      .mount {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        overflow: hidden;
      }

      .canvas {
        width: 100%;
        height: 100%;
        position: relative;
      }

      /* ── Shared view styles ─────────────────────────────── */
      .view-base {
        width: 100%; height: 100%;
        padding: 32px;
        background: linear-gradient(145deg, var(--mb-dark), var(--mb-black));
        overflow: hidden;
      }

      .view-base::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 20% 80%, rgba(0, 173, 239, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 20%, rgba(0, 173, 239, 0.02) 0%, transparent 50%);
        pointer-events: none;
      }

      /* ── Header ─────────────────────────────────────────── */
      .view-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      .view-header h1 {
        font-size: 1.6em;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .view-header h1 small {
        font-weight: 300;
        opacity: 0.5;
        font-size: 0.6em;
        margin-left: 8px;
      }

      .mb-logo {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 2px solid var(--mb-silver);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 10px;
        color: var(--mb-silver);
        letter-spacing: 1px;
        flex-shrink: 0;
      }

      .breadcrumb {
        font-size: 0.75em;
        color: var(--mb-muted);
        margin-bottom: 20px;
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .breadcrumb span { opacity: 0.4; }

      /* ── Status badge ───────────────────────────────────── */
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.72em;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 4px 10px;
        border-radius: 4px;
      }

      .status::before {
        content: '';
        width: 7px; height: 7px;
        border-radius: 50%;
      }

      .status-ok { background: rgba(46, 204, 113, 0.12); color: var(--mb-green); }
      .status-ok::before { background: var(--mb-green); }
      .status-warn { background: rgba(241, 196, 15, 0.12); color: var(--mb-yellow); }
      .status-warn::before { background: var(--mb-yellow); }
      .status-error { background: rgba(231, 76, 60, 0.12); color: var(--mb-red); }
      .status-error::before { background: var(--mb-red); animation: pulse-dot 1.5s infinite; }
      .status-idle { background: rgba(255,255,255,0.06); color: var(--mb-muted); }
      .status-idle::before { background: var(--mb-muted); }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      /* ── Cards / zones ──────────────────────────────────── */
      .card {
        background: var(--mb-surface);
        border: 1px solid var(--mb-border);
        border-radius: 12px;
        padding: 18px;
        transition: border-color 0.2s;
      }

      .card.zoom-me:hover {
        border-color: rgba(0, 173, 239, 0.3);
      }

      .card-title {
        font-size: 0.85em;
        font-weight: 600;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .card-subtitle {
        font-size: 0.7em;
        color: var(--mb-muted);
      }

      /* ── KPI row ────────────────────────────────────────── */
      .kpi-row {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .kpi {
        background: var(--mb-surface);
        border: 1px solid var(--mb-border);
        border-radius: 10px;
        padding: 14px 18px;
        min-width: 140px;
        flex: 1;
      }

      .kpi-label {
        font-size: 0.65em;
        color: var(--mb-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 4px;
      }

      .kpi-value {
        font-size: 1.5em;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .kpi-value.accent { color: var(--mb-accent); }
      .kpi-value.green { color: var(--mb-green); }
      .kpi-value.yellow { color: var(--mb-yellow); }
      .kpi-value.red { color: var(--mb-red); }

      .kpi-delta {
        font-size: 0.65em;
        margin-top: 2px;
      }
      .kpi-delta.up { color: var(--mb-green); }
      .kpi-delta.down { color: var(--mb-red); }

      /* ── Plant grid (Level 1) ───────────────────────────── */
      .plant-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 16px;
        height: calc(100% - 140px);
      }

      .plant-zone {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .plant-zone .zone-icon {
        font-size: 2em;
        margin-bottom: 8px;
        opacity: 0.9;
      }

      .zone-stats {
        display: flex;
        gap: 12px;
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px solid var(--mb-border);
        font-size: 0.7em;
      }

      .zone-stat {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .zone-stat .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
      }

      /* ── Line layout (Level 2) ──────────────────────────── */
      .line-layout {
        display: flex;
        gap: 12px;
        height: calc(100% - 160px);
        align-items: stretch;
        overflow: hidden;
      }

      .station-card {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        position: relative;
      }

      .station-card .station-visual {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5em;
        opacity: 0.8;
        position: relative;
      }

      .station-progress {
        height: 3px;
        background: var(--mb-border);
        border-radius: 2px;
        margin-top: 10px;
        overflow: hidden;
      }

      .station-progress-bar {
        height: 100%;
        border-radius: 2px;
        transition: width 0.3s;
      }

      .connector {
        display: flex;
        align-items: center;
        color: var(--mb-muted);
        font-size: 1.2em;
        flex-shrink: 0;
        opacity: 0.3;
      }

      /* ── Station detail (Level 3) ───────────────────────── */
      .station-detail {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        height: calc(100% - 180px);
      }

      .component-card {
        display: flex;
        flex-direction: column;
      }

      .component-visual {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5em;
        position: relative;
      }

      .specs-list {
        font-size: 0.72em;
        margin-top: 8px;
      }

      .specs-list dt {
        color: var(--mb-muted);
        float: left;
        clear: left;
        width: 90px;
      }

      .specs-list dd {
        margin-left: 95px;
        margin-bottom: 3px;
      }

      /* ── Component detail (Level 4) ─────────────────────── */
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        gap: 16px;
        height: calc(100% - 140px);
      }

      .detail-section {
        background: var(--mb-surface);
        border: 1px solid var(--mb-border);
        border-radius: 10px;
        padding: 16px;
      }

      .detail-section h3 {
        font-size: 0.75em;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--mb-muted);
        margin-bottom: 12px;
      }

      .metric-row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid var(--mb-border);
        font-size: 0.82em;
      }

      .metric-row:last-child { border-bottom: none; }

      .metric-label { color: var(--mb-muted); }

      .bar-chart {
        display: flex;
        align-items: flex-end;
        gap: 6px;
        height: 80px;
        margin-top: 8px;
      }

      .bar-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        height: 100%;
        justify-content: flex-end;
      }

      .bar {
        width: 100%;
        border-radius: 3px 3px 0 0;
        min-height: 4px;
      }

      .bar-label {
        font-size: 0.6em;
        color: var(--mb-muted);
      }

      .timeline {
        font-size: 0.78em;
      }

      .timeline-item {
        display: flex;
        gap: 10px;
        padding: 6px 0;
        border-left: 2px solid var(--mb-border);
        padding-left: 12px;
        margin-left: 4px;
        position: relative;
      }

      .timeline-item::before {
        content: '';
        position: absolute;
        left: -5px; top: 10px;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--mb-accent);
      }

      .timeline-item.warn::before { background: var(--mb-yellow); }
      .timeline-item.error::before { background: var(--mb-red); }

      .timeline-time {
        color: var(--mb-muted);
        white-space: nowrap;
        min-width: 48px;
      }

      /* ── Utility ────────────────────────────────────────── */
      .text-accent { color: var(--mb-accent); }
      .text-muted { color: var(--mb-muted); }
      .text-sm { font-size: 0.75em; }
      .mt-auto { margin-top: auto; }
      .gap-8 { gap: 8px; }
      .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
  </head>

  <body>
    <div class="mount">
      <div class="canvas zumly-canvas"></div>
    </div>

    <script src="/dist/zumly.js"></script>
    <script>
      const ZumlyLib = window.Zumly || globalThis.Zumly

      // ────────────────────────────────────────────────────
      // Level 1 — Plant Overview
      // ────────────────────────────────────────────────────
      const plant = `
        <div class="z-view view-base">
          <div class="view-header">
            <div class="mb-logo">MB</div>
            <h1>Planta Truck Assembly <small>Mercedes-Benz Argentina</small></h1>
            <span class="status status-ok" style="margin-left:auto">Operativa</span>
          </div>

          <div class="kpi-row">
            <div class="kpi">
              <div class="kpi-label">Produccion hoy</div>
              <div class="kpi-value accent">47 <span class="text-sm">/ 62</span></div>
              <div class="kpi-delta up">+3 vs ayer</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Eficiencia</div>
              <div class="kpi-value green">94.2%</div>
              <div class="kpi-delta up">+1.1%</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Alertas activas</div>
              <div class="kpi-value yellow">3</div>
              <div class="kpi-delta down">+1</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Tiempo ciclo</div>
              <div class="kpi-value">12.4 <span class="text-sm">min</span></div>
              <div class="kpi-delta up">-0.3 min</div>
            </div>
          </div>

          <div class="plant-grid">
            <div class="card zoom-me plant-zone" data-to="lineaChassis">
              <div class="zone-icon">&boxbox;</div>
              <div class="card-title">Linea Chassis <span class="status status-ok">Activa</span></div>
              <div class="card-subtitle">Ensamble de bastidor, ejes y suspension</div>
              <div class="zone-stats">
                <div class="zone-stat"><div class="dot" style="background:var(--mb-green)"></div> 6 estaciones</div>
                <div class="zone-stat"><div class="dot" style="background:var(--mb-accent)"></div> 23 unidades</div>
              </div>
            </div>
            <div class="card zoom-me plant-zone" data-to="lineaMotor">
              <div class="zone-icon">&circledcirc;</div>
              <div class="card-title">Linea Motor <span class="status status-warn">Alerta</span></div>
              <div class="card-subtitle">Montaje de motor, transmision y cableado</div>
              <div class="zone-stats">
                <div class="zone-stat"><div class="dot" style="background:var(--mb-yellow)"></div> 5 estaciones</div>

            <div class="card plant-zone" style="cursor:default">
              <div class="zone-icon">&vrtri;</div>

                <div class="zone-stat"><div class="dot" style="background:var(--mb-green)"></div> 4 estaciones</div>

              <div class="zone-icon">&check;</div>
              <div class="card-title">Inspeccion Final <span class="status status-ok">Activa</span></div>
              <div class="card-subtitle">Control de calidad, test de frenos y rodaje</div>
              <div class="zone-stats">
                <div class="zone-stat"><div class="dot" style="background:var(--mb-green)"></div> 3 estaciones</div>
                <div class="zone-stat"><div class="dot" style="background:var(--mb-accent)"></div> 12 unidades</div>
              </div>
            </div>
          </div>
        </div>
      `

      // ────────────────────────────────────────────────────
      // Level 2 — Linea Chassis
      // ────────────────────────────────────────────────────
      const lineaChassis = `

          <div class="breadcrumb">Planta <span>&rsaquo;</span> Linea Chassis</div>
          <div class="view-header">
            <h1>&boxbox; Linea Chassis</h1>
            <span class="status status-ok" style="margin-left:auto">6/6 activas</span>
          </div>

          <div class="kpi-row">
            <div class="kpi">
              <div class="kpi-label">Unidades en linea</div>
              <div class="kpi-value accent">23</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Tiempo ciclo promedio</div>
              <div class="kpi-value">11.8 <span class="text-sm">min</span></div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Scrap rate</div>
              <div class="kpi-value green">0.3%</div>
            </div>
          </div>

          <div class="line-layout">
            <div class="card zoom-me station-card" data-to="estacionBastidor">
              <div class="card-title">E1 <span class="status status-ok">OK</span></div>
              <div class="card-subtitle">Bastidor</div>
              <div class="station-visual">&boxbox;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:78%;background:var(--mb-accent)"></div></div>
            </div>
            <div class="connector">&rarr;</div>
            <div class="card station-card">
              <div class="card-title">E2 <span class="status status-ok">OK</span></div>
              <div class="card-subtitle">Eje delantero</div>
              <div class="station-visual">&dharl;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:92%;background:var(--mb-green)"></div></div>
            </div>
            <div class="connector">&rarr;</div>
            <div class="card station-card">
              <div class="card-title">E3 <span class="status status-warn">Alerta</span></div>
              <div class="card-subtitle">Eje trasero</div>
              <div class="station-visual">&dharr;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:45%;background:var(--mb-yellow)"></div></div>
            </div>
            <div class="connector">&rarr;</div>
            <div class="card station-card">
              <div class="card-title">E4 <span class="status status-ok">OK</span></div>
              <div class="card-subtitle">Suspension</div>
              <div class="station-visual">&zigrarr;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:88%;background:var(--mb-green)"></div></div>
            </div>
            <div class="connector">&rarr;</div>
            <div class="card station-card">
              <div class="card-title">E5 <span class="status status-ok">OK</span></div>
              <div class="card-subtitle">Torque</div>
              <div class="station-visual">&circlearrowright;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:95%;background:var(--mb-green)"></div></div>

            <div class="connector">&rarr;</div>
            <div class="card station-card">
              <div class="card-title">E6 <span class="status status-ok">OK</span></div>
              <div class="card-subtitle">QC</div>
              <div class="station-visual">&check;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:100%;background:var(--mb-green)"></div></div>
            </div>
          </div>
        </div>
      `

      // ────────────────────────────────────────────────────
      // Level 2 — Linea Motor
      // ────────────────────────────────────────────────────
      const lineaMotor = `
        <div class="z-view view-base">
          <div class="breadcrumb">Planta <span>&rsaquo;</span> Linea Motor</div>
          <div class="view-header">
            <h1>&circledcirc; Linea Motor</h1>
            <span class="status status-warn" style="margin-left:auto">4/5 activas</span>
          </div>

          <div class="kpi-row">
            <div class="kpi">
              <div class="kpi-label">Unidades en linea</div>
              <div class="kpi-value accent">18</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Tiempo ciclo promedio</div>
              <div class="kpi-value yellow">14.2 <span class="text-sm">min</span></div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Downtime hoy</div>
              <div class="kpi-value red">23 <span class="text-sm">min</span></div>
            </div>
          </div>

          <div class="line-layout">
            <div class="card station-card">
              <div class="card-title">M1 <span class="status status-ok">OK</span></div>
              <div class="card-subtitle">Montaje motor</div>
              <div class="station-visual">&circledcirc;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:85%;background:var(--mb-green)"></div></div>
            </div>
            <div class="connector">&rarr;</div>
            <div class="card station-card">
              <div class="card-title">M2 <span class="status status-ok">OK</span></div>
              <div class="card-subtitle">Transmision</div>
              <div class="station-visual">&oplus;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:72%;background:var(--mb-accent)"></div></div>
            </div>
            <div class="connector">&rarr;</div>
            <div class="card station-card">
              <div class="card-title">M3 <span class="status status-error">Falla</span></div>
              <div class="card-subtitle">Cableado</div>
              <div class="station-visual" style="color:var(--mb-red)">&nwarr;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:12%;background:var(--mb-red)"></div></div>
            </div>
            <div class="connector">&rarr;</div>
            <div class="card station-card">
              <div class="card-title">M4 <span class="status status-idle">Espera</span></div>
              <div class="card-subtitle">Fluidos</div>
              <div class="station-visual" style="opacity:0.3">&dtrif;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:0%;background:var(--mb-muted)"></div></div>
            </div>
            <div class="connector">&rarr;</div>
            <div class="card station-card">
              <div class="card-title">M5 <span class="status status-ok">OK</span></div>
              <div class="card-subtitle">QC Motor</div>
              <div class="station-visual">&check;</div>
              <div class="station-progress"><div class="station-progress-bar" style="width:60%;background:var(--mb-accent)"></div></div>
            </div>
          </div>
        </div>
      `

      // ────────────────────────────────────────────────────
      // Level 3 — Estacion Bastidor (E1)
      // ────────────────────────────────────────────────────
      const estacionBastidor = `
        <div class="z-view view-base">
          <div class="breadcrumb">Planta <span>&rsaquo;</span> Linea Chassis <span>&rsaquo;</span> E1 Bastidor</div>
          <div class="view-header">
            <h1>&boxbox; Estacion E1 — Bastidor</h1>
            <span class="status status-ok" style="margin-left:auto">Operativa</span>
          </div>

          <div class="kpi-row">
            <div class="kpi">
              <div class="kpi-label">Unidad actual</div>
              <div class="kpi-value accent">CHF-2847</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Progreso</div>
              <div class="kpi-value">78%</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Operario</div>
              <div class="kpi-value text-sm" style="font-size:1.1em">R. Gonzalez</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Tiempo en estacion</div>
              <div class="kpi-value">9:12 <span class="text-sm">min</span></div>
            </div>
          </div>

          <div class="station-detail">
            <div class="card zoom-me component-card" data-to="componenteLarguero">
