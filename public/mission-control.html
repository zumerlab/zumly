<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zumly - Mission Control</title>
    <link rel="stylesheet" href="/dist/zumly.css" />
    <style>
      :root {
        --mc-black: #060612;
        --mc-dark: #0c0c24;
        --mc-surface: rgba(255, 255, 255, 0.03);
        --mc-border: rgba(255, 255, 255, 0.06);
        --mc-blue: #4a9eff;
        --mc-blue-dim: rgba(74, 158, 255, 0.10);
        --mc-cyan: #00e5ff;
        --mc-cyan-dim: rgba(0, 229, 255, 0.08);
        --mc-green: #00e676;
        --mc-green-dim: rgba(0, 230, 118, 0.10);
        --mc-yellow: #ffd740;
        --mc-yellow-dim: rgba(255, 215, 64, 0.10);
        --mc-red: #ff5252;
        --mc-red-dim: rgba(255, 82, 82, 0.10);
        --mc-orange: #ff9100;
        --mc-text: #d8dce8;
        --mc-muted: rgba(216, 220, 232, 0.40);
        --mc-glow: 0 0 20px rgba(74, 158, 255, 0.15);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
        background: var(--mc-black);
        color: var(--mc-text);
        overflow: hidden;
      }

      .mount { position: absolute; inset: 0; overflow: hidden; }
      .canvas { width: 100%; height: 100%; }

      /* ── Base view ──────────────────────────────────────── */
      .v {
        width: 100%; height: 100%;
        padding: 24px 28px;
        background: radial-gradient(ellipse at 50% 50%, #0d0d28 0%, var(--mc-black) 70%);
        overflow: hidden;
      }

      /* Stars background */
      .v::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4), transparent),
          radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.3), transparent),
          radial-gradient(1px 1px at 40% 20%, rgba(255,255,255,0.2), transparent),
          radial-gradient(1px 1px at 55% 75%, rgba(255,255,255,0.35), transparent),
          radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.25), transparent),
          radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.3), transparent),
          radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.2), transparent),
          radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.4), transparent),
          radial-gradient(1px 1px at 35% 90%, rgba(255,255,255,0.15), transparent),
          radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.2), transparent),
          radial-gradient(1.5px 1.5px at 5% 55%, rgba(200,220,255,0.5), transparent),
          radial-gradient(1.5px 1.5px at 75% 85%, rgba(200,220,255,0.4), transparent),
          radial-gradient(1px 1px at 48% 8%, rgba(255,255,255,0.3), transparent),
          radial-gradient(1px 1px at 82% 42%, rgba(255,255,255,0.2), transparent),
          radial-gradient(1px 1px at 20% 65%, rgba(255,255,255,0.25), transparent);
        pointer-events: none;
      }

      .hdr {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
        position: relative;
        z-index: 1;
      }

      .hdr h1 {
        font-size: 1.15em;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .hdr h1 small {
        font-weight: 300;
        opacity: 0.35;
        font-size: 0.6em;
        margin-left: 8px;
        text-transform: none;
        letter-spacing: 0;
      }

      .nasa-mark {
        width: 34px; height: 34px;
        border-radius: 50%;
        border: 1.5px solid var(--mc-blue);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 8px;
        color: var(--mc-blue);
        letter-spacing: 2px;
        flex-shrink: 0;
        box-shadow: var(--mc-glow);
      }

      .bc {
        font-size: 0.65em;
        color: var(--mc-muted);
        margin-bottom: 12px;
        position: relative;
        z-index: 1;
      }

      .bc span { opacity: 0.3; margin: 0 4px; }

      /* ── Badges ──────────────────────────────────────────── */
      .b {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.6em;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 3px 8px;
        border-radius: 3px;
      }

      .b::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }

      .b-g { background: var(--mc-green-dim); color: var(--mc-green); }
      .b-g::before { background: var(--mc-green); }
      .b-y { background: var(--mc-yellow-dim); color: var(--mc-yellow); }
      .b-y::before { background: var(--mc-yellow); }
      .b-r { background: var(--mc-red-dim); color: var(--mc-red); }
      .b-r::before { background: var(--mc-red); animation: blink 1.2s infinite; }
      .b-c { background: var(--mc-cyan-dim); color: var(--mc-cyan); }
      .b-c::before { background: var(--mc-cyan); }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

      /* ── KPIs ────────────────────────────────────────────── */
      .kpis {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
      }

      .kpi {
        background: var(--mc-surface);
        border: 1px solid var(--mc-border);
        border-radius: 6px;
        padding: 8px 12px;
        min-width: 100px;
        flex: 1;
      }

      .kpi-l {
        font-size: 0.55em;
        color: var(--mc-muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 2px;
      }

      .kpi-v {
        font-size: 1.15em;
        font-weight: 700;
      }

      .sm { font-size: 0.6em; font-weight: 400; opacity: 0.5; }
      .c-b { color: var(--mc-blue); }
      .c-c { color: var(--mc-cyan); }
      .c-g { color: var(--mc-green); }
      .c-y { color: var(--mc-yellow); }
      .c-r { color: var(--mc-red); }

      /* ── Orbit map (Level 1) ─────────────────────────────── */
      .control-layout {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 16px;
        height: calc(100% - 110px);
        position: relative;
        z-index: 1;
      }

      .orbit-panel {
        background: var(--mc-surface);
        border: 1px solid var(--mc-border);
        border-radius: 10px;
        padding: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .orbit-panel svg { width: 100%; height: 100%; }

      .fleet-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
      }

      .fleet-panel-title {
        font-size: 0.6em;
        color: var(--mc-muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--mc-border);
      }

      .sat-card {
        background: var(--mc-surface);
        border: 1px solid var(--mc-border);
        border-radius: 8px;
        padding: 10px 12px;
        transition: border-color 0.2s;
      }

      .sat-card.zoom-me:hover {
        border-color: rgba(74, 158, 255, 0.4);
        box-shadow: var(--mc-glow);
      }

      .sat-card.has-anomaly {
        border-color: rgba(255, 82, 82, 0.25);
      }

      .sat-card.has-anomaly.zoom-me:hover {
        border-color: var(--mc-red);
      }

      .sat-card.has-warning {
        border-color: rgba(255, 215, 64, 0.20);
      }

      .sat-card.has-warning.zoom-me:hover {
        border-color: var(--mc-yellow);
      }

      .sat-name {
        font-size: 0.75em;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .sat-meta {
        font-size: 0.6em;
        color: var(--mc-muted);
        margin-top: 3px;
        line-height: 1.4;
      }

      .sat-telemetry {
        display: flex;
        gap: 10px;
        margin-top: 6px;
        font-size: 0.58em;
      }

      .tel-item {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .tel-label { color: var(--mc-muted); }
      .tel-val { font-weight: 600; }

      /* ── Satellite detail (Level 2) ──────────────────────── */
      .sat-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        gap: 14px;
        height: calc(100% - 130px);
        position: relative;
        z-index: 1;
      }

      .panel {
        background: var(--mc-surface);
        border: 1px solid var(--mc-border);
        border-radius: 8px;
        padding: 12px 14px;
      }

      .panel h3 {
        font-size: 0.6em;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--mc-muted);
        margin-bottom: 8px;
      }

      .subsys-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .subsys {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 8px;
        border-radius: 5px;
        font-size: 0.75em;
        background: rgba(255,255,255,0.015);
        border: 1px solid transparent;
        transition: border-color 0.2s;
      }

      .subsys.zoom-me {
        border-color: var(--mc-border);
      }

      .subsys.zoom-me:hover {
        border-color: rgba(74, 158, 255, 0.35);
      }

      .subsys-name {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .subsys-val {
        font-weight: 600;
        font-size: 0.9em;
      }

      .row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        border-bottom: 1px solid var(--mc-border);
        font-size: 0.72em;
      }

      .row:last-child { border-bottom: none; }
      .row-l { color: var(--mc-muted); }

      .sat-svg-panel {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .sat-svg-panel svg { width: 100%; max-height: 280px; }

      /* ── Issue detail (Level 3) ──────────────────────────── */
      .issue-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        gap: 14px;
        height: calc(100% - 140px);
        position: relative;
        z-index: 1;
      }

      .chart-bars {
        display: flex;
        align-items: flex-end;
        gap: 4px;
        height: 70px;
        margin-top: 6px;
      }

      .chart-bar {
        flex: 1;
        border-radius: 2px 2px 0 0;
        min-height: 3px;
      }

      .timeline { font-size: 0.7em; }

      .tl-item {
        display: flex;
        gap: 8px;
        padding: 4px 0;
        border-left: 2px solid var(--mc-border);
        padding-left: 10px;
        margin-left: 3px;
        position: relative;
      }

      .tl-item::before {
        content: '';
        position: absolute;
        left: -4px; top: 8px;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--mc-blue);
      }

      .tl-item.warn::before { background: var(--mc-yellow); }
      .tl-item.err::before { background: var(--mc-red); }

      .tl-t {
        color: var(--mc-muted);
        white-space: nowrap;
        min-width: 50px;
      }

      /* ── Orbit animation ─────────────────────────────────── */
      .orbit-anim { animation: spin 60s linear infinite; transform-origin: 50% 50%; }
      .orbit-anim-2 { animation: spin 90s linear infinite; transform-origin: 50% 50%; }
      .orbit-anim-3 { animation: spin 45s linear infinite reverse; transform-origin: 50% 50%; }

      .orbit-anim.paused,
      .orbit-anim-2.paused,
      .orbit-anim-3.paused { animation-play-state: paused; }

      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      /* Satellite ping */
      .sat-ping {
        animation: ping 2s ease-out infinite;
      }

      .sat-ping.paused { animation-play-state: paused; }

      @keyframes ping {
        0% { r: 4; opacity: 0.8; }
        100% { r: 14; opacity: 0; }
      }

      /* Signal waves */
      .signal-wave { animation: wave 3s ease-out infinite; }
      .signal-wave.paused { animation-play-state: paused; }

      @keyframes wave {
        0% { stroke-dashoffset: 0; opacity: 0.6; }
        100% { stroke-dashoffset: -20; opacity: 0; }
      }
    </style>
  </head>

  <body>
    <div class="mount">
      <div class="canvas zumly-canvas"></div>
    </div>

    <script src="/dist/zumly.js"></script>
    <script>
      const ZumlyLib = window.Zumly || globalThis.Zumly

      // ── Satellite constellation data ───────────────────
      const constellation = [
        {
          id: 'AQUA-7', type: 'Earth Observation', orbit: 'LEO',
          alt: 705, inc: 98.2, period: '98.8 min',
          status: 'nominal',
          subsystems: {
            power: { status: 'ok', val: '28.4V', detail: 'Solar array nominal' },
            thermal: { status: 'ok', val: '22°C', detail: 'Within range' },
            comms: { status: 'ok', val: '2.1 Mbps', detail: 'X-band nominal' },
            adcs: { status: 'ok', val: '0.003°', detail: 'Pointing nominal' },
            payload: { status: 'ok', val: 'Active', detail: 'MODIS scanning' },
            propulsion: { status: 'ok', val: '12.4 kg', detail: 'Hydrazine nominal' }
          }
        },
        {
          id: 'HELIO-3', type: 'Solar Observatory', orbit: 'L1 Halo',
          alt: 1500000, inc: 0, period: '~180 days',
          status: 'anomaly',
          subsystems: {
            power: { status: 'warn', val: '26.1V', detail: 'Solar array degradation cell B7-B12, output -8%' },
            thermal: { status: 'fail', val: '47°C', detail: 'Reaction wheel 3 overtemp. Bearing friction anomaly. RW3 isolated, momentum managed via RW1+RW2+magnetorquers.' },
            comms: { status: 'ok', val: '1.8 Mbps', detail: 'DSN Goldstone link active' },
            adcs: { status: 'warn', val: '0.012°', detail: 'Degraded — 3-wheel mode, jitter +300%' },
            payload: { status: 'ok', val: 'Active', detail: 'Coronagraph imaging' },
            propulsion: { status: 'ok', val: '8.2 kg', detail: 'Station-keeping nominal' }
          }
        },
        {
          id: 'RELAY-12', type: 'TDRS Relay', orbit: 'GEO',
          alt: 35786, inc: 0.05, period: '23h 56m',
          status: 'nominal',
          subsystems: {
            power: { status: 'ok', val: '31.2V', detail: 'Bus nominal' },
            thermal: { status: 'ok', val: '18°C', detail: 'Radiators nominal' },
            comms: { status: 'ok', val: '300 Mbps', detail: 'Ka-band active, 4 users' },
            adcs: { status: 'ok', val: '0.01°', detail: 'Geo-pointing lock' },
            payload: { status: 'ok', val: 'Active', detail: 'SA/MA/KaSA transponders' },
            propulsion: { status: 'ok', val: '34.1 kg', detail: 'Biprop nominal' }
          }
        },
        {
          id: 'POLAR-9', type: 'Weather/Climate', orbit: 'SSO',
          alt: 824, inc: 98.7, period: '101.4 min',
          status: 'warning',
          subsystems: {
            power: { status: 'ok', val: '29.0V', detail: 'Nominal' },
            thermal: { status: 'ok', val: '20°C', detail: 'Within range' },
            comms: { status: 'warn', val: '0.8 Mbps', detail: 'S-band antenna gimbal stuck at 12° offset. Throughput reduced 60%. Backup antenna online.' },
            adcs: { status: 'ok', val: '0.005°', detail: 'Star tracker nominal' },
            payload: { status: 'ok', val: 'Active', detail: 'VIIRS + CrIS scanning' },
            propulsion: { status: 'ok', val: '5.1 kg', detail: 'Low but sufficient for 2yr' }
          }
        },
        {
          id: 'DEEP-4', type: 'Deep Space Probe', orbit: 'Heliocentric',
          alt: 248000000, inc: 1.8, period: '687 days',
          status: 'nominal',
          subsystems: {
            power: { status: 'ok', val: '24.8V', detail: 'RTG output nominal' },
            thermal: { status: 'ok', val: '-12°C', detail: 'Heaters active, within range' },
            comms: { status: 'ok', val: '0.02 Mbps', detail: 'DSN Madrid uplink, 34m antenna' },
            adcs: { status: 'ok', val: '0.1°', detail: 'Celestial nav lock' },
            payload: { status: 'ok', val: 'Standby', detail: 'Instruments hibernating until encounter' },
            propulsion: { status: 'ok', val: '112 kg', detail: 'Ion drive, 4200s Isp' }
          }
        },
        {
          id: 'COSMO-2', type: 'Space Telescope', orbit: 'L2 Halo',
          alt: 1500000, inc: 0, period: '~180 days',
          status: 'anomaly',
          subsystems: {
            power: { status: 'ok', val: '30.1V', detail: 'Solar array nominal' },
            thermal: { status: 'ok', val: '-233°C', detail: 'Cryo cooler nominal' },
            comms: { status: 'ok', val: '28 Mbps', detail: 'Ka-band nominal' },
            adcs: { status: 'ok', val: '0.001°', detail: 'Fine guidance lock' },
            payload: { status: 'fail', val: 'Degraded', detail: 'NIRSpec micro-shutter array: 14 stuck-closed shutters in quadrant 3. 2.3% FOV loss. Calibration matrix updated.' },
            propulsion: { status: 'ok', val: '22.6 kg', detail: 'Station-keeping nominal' }
          }
        }
      ]

      // ── SVG builders ───────────────────────────────────
      function orbitMapSVG () {
        const cx = 250, cy = 200
        // foreignObject hit areas for each satellite (zoom-me targets)
        function satHit (x, y, w, h, id, color) {
          return `<foreignObject x="${x - w/2}" y="${y - h/2}" width="${w}" height="${h}">
            <div xmlns="http://www.w3.org/1999/xhtml" class="zoom-me" data-to="sat_${id}"
                 style="width:100%;height:100%;cursor:zoom-in;border-radius:6px;border:1px solid transparent;transition:border-color 0.2s;display:flex;align-items:center;justify-content:center;"
                 onmouseover="this.style.borderColor='${color}';this.style.boxShadow='0 0 12px ${color}44'"
                 onmouseout="this.style.borderColor='transparent';this.style.boxShadow='none'">
            </div>
          </foreignObject>`
        }
        return `<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
          <!-- Earth -->
          <defs>
            <radialGradient id="earthGrad" cx="45%" cy="40%">
              <stop offset="0%" stop-color="#1a4a8a"/>
              <stop offset="50%" stop-color="#0d2d5e"/>
              <stop offset="100%" stop-color="#061430"/>
            </radialGradient>
            <radialGradient id="atmo" cx="50%" cy="50%">
              <stop offset="80%" stop-color="transparent"/>
              <stop offset="100%" stop-color="rgba(74,158,255,0.08)"/>
            </radialGradient>
          </defs>
          <circle cx="${cx}" cy="${cy}" r="42" fill="url(#earthGrad)" stroke="rgba(74,158,255,0.2)" stroke-width="1"/>
          <circle cx="${cx}" cy="${cy}" r="50" fill="url(#atmo)" stroke="none"/>
          <!-- Orbit rings -->
          <ellipse cx="${cx}" cy="${cy}" rx="75" ry="30" fill="none" stroke="rgba(74,158,255,0.12)" stroke-width="0.8" stroke-dasharray="4 3"/>
          <ellipse cx="${cx}" cy="${cy}" rx="115" ry="50" fill="none" stroke="rgba(0,229,255,0.10)" stroke-width="0.8" stroke-dasharray="4 3"/>
          <ellipse cx="${cx}" cy="${cy}" rx="170" ry="70" fill="none" stroke="rgba(255,215,64,0.08)" stroke-width="0.8" stroke-dasharray="4 3"/>

          <!-- LEO sats (visual + clickable) -->
          <g class="orbit-anim" id="orbit-leo">
            <circle cx="${cx + 75}" cy="${cy}" r="4" fill="#00e676"/>
            <circle cx="${cx + 75}" cy="${cy}" r="4" fill="#00e676" class="sat-ping" opacity="0"/>
            <text x="${cx + 75}" y="${cy - 10}" text-anchor="middle" fill="#00e676" font-size="7" font-family="monospace">AQUA-7</text>
            ${satHit(cx + 75, cy, 60, 36, 'AQUA-7', '#00e676')}
          </g>
          <g class="orbit-anim-3" id="orbit-sso">
            <circle cx="${cx - 68}" cy="${cy + 20}" r="4" fill="#ffd740"/>
            <circle cx="${cx - 68}" cy="${cy + 20}" r="4" fill="#ffd740" class="sat-ping" opacity="0"/>
            <text x="${cx - 68}" y="${cy + 34}" text-anchor="middle" fill="#ffd740" font-size="7" font-family="monospace">POLAR-9</text>
            ${satHit(cx - 68, cy + 20, 60, 36, 'POLAR-9', '#ffd740')}
          </g>

          <!-- GEO (visual + clickable) -->
          <g class="orbit-anim-2" id="orbit-geo">
            <circle cx="${cx}" cy="${cy - 50}" r="4" fill="#00e676"/>
            <circle cx="${cx}" cy="${cy - 50}" r="4" fill="#00e676" class="sat-ping" opacity="0"/>
            <text x="${cx}" y="${cy - 60}" text-anchor="middle" fill="#00e676" font-size="7" font-family="monospace">RELAY-12</text>
            ${satHit(cx, cy - 50, 60, 36, 'RELAY-12', '#00e676')}
          </g>

          <!-- L1/L2/Deep (visual) -->
          <circle cx="60" cy="80" r="5" fill="#ff5252" stroke="rgba(255,82,82,0.3)" stroke-width="6">
            <animate attributeName="stroke-opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
          </circle>
          <text x="60" y="68" text-anchor="middle" fill="#ff5252" font-size="7" font-family="monospace">HELIO-3</text>
          <text x="60" y="100" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="6" font-family="monospace">L1</text>

          <circle cx="440" cy="80" r="5" fill="#ff5252" stroke="rgba(255,82,82,0.3)" stroke-width="6">
            <animate attributeName="stroke-opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
          </circle>
          <text x="440" y="68" text-anchor="middle" fill="#ff5252" font-size="7" font-family="monospace">COSMO-2</text>
          <text x="440" y="100" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="6" font-family="monospace">L2</text>

          <circle cx="440" cy="340" r="4" fill="#00e676"/>
          <text x="440" y="330" text-anchor="middle" fill="#00e676" font-size="7" font-family="monospace">DEEP-4</text>
          <text x="440" y="356" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="6" font-family="monospace">Mars transit</text>

          <!-- DSN links -->
          <line x1="60" y1="85" x2="${cx - 40}" y2="${cy - 5}" stroke="rgba(74,158,255,0.08)" stroke-width="0.5" stroke-dasharray="3 4"/>
          <line x1="440" y1="85" x2="${cx + 40}" y2="${cy - 5}" stroke="rgba(74,158,255,0.08)" stroke-width="0.5" stroke-dasharray="3 4"/>
          <line x1="440" y1="335" x2="${cx + 40}" y2="${cy + 10}" stroke="rgba(74,158,255,0.06)" stroke-width="0.5" stroke-dasharray="3 6"/>

          <!-- Clickable hit areas (foreignObject with zoom-me) -->
          ${satHit(60, 80, 60, 40, 'HELIO-3', '#ff5252')}
          ${satHit(440, 80, 60, 40, 'COSMO-2', '#ff5252')}
          ${satHit(440, 340, 60, 40, 'DEEP-4', '#00e676')}

          <!-- Labels -->
          <text x="${cx}" y="390" text-anchor="middle" fill="rgba(255,255,255,0.15)" font-size="8" font-family="monospace">LEO · GEO · L1 · L2 · HELIOCENTRIC</text>
        </svg>`
      }

      function satelliteSVG (sat) {
        const c = (s) => s === 'fail' ? '#ff5252' : s === 'warn' ? '#ffd740' : '#00e676'
        const pulse = (s) => s === 'fail' ? '<animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>' : ''
        const ss = sat.subsystems
        return `<svg viewBox="0 0 340 240" xmlns="http://www.w3.org/2000/svg">
          <!-- Bus -->
          <rect x="120" y="70" width="100" height="100" rx="4" stroke="#555" stroke-width="1.5" fill="rgba(255,255,255,0.02)"/>
          <text x="170" y="125" text-anchor="middle" fill="#555" font-size="9" font-family="monospace">BUS</text>

          <!-- Solar panels -->
          <rect x="10" y="85" width="95" height="70" rx="3" stroke="${c(ss.power.status)}" stroke-width="1.5" fill="rgba(255,255,255,0.015)">
            ${pulse(ss.power.status)}
          </rect>
          <line x1="57" y1="85" x2="57" y2="155" stroke="${c(ss.power.status)}" stroke-width="0.5" opacity="0.4"/>
          <line x1="10" y1="120" x2="105" y2="120" stroke="${c(ss.power.status)}" stroke-width="0.5" opacity="0.4"/>
          <text x="57" y="80" text-anchor="middle" fill="${c(ss.power.status)}" font-size="8" font-family="monospace">POWER ${ss.power.val}</text>

          <rect x="235" y="85" width="95" height="70" rx="3" stroke="${c(ss.power.status)}" stroke-width="1.5" fill="rgba(255,255,255,0.015)"/>
          <line x1="282" y1="85" x2="282" y2="155" stroke="${c(ss.power.status)}" stroke-width="0.5" opacity="0.4"/>
          <line x1="235" y1="120" x2="330" y2="120" stroke="${c(ss.power.status)}" stroke-width="0.5" opacity="0.4"/>

          <!-- Antenna -->
          <line x1="170" y1="70" x2="170" y2="35" stroke="${c(ss.comms.status)}" stroke-width="1.5"/>
          <circle cx="170" cy="28" r="8" stroke="${c(ss.comms.status)}" stroke-width="1.5" fill="none">
            ${pulse(ss.comms.status)}
          </circle>
          <text x="170" y="18" text-anchor="middle" fill="${c(ss.comms.status)}" font-size="8" font-family="monospace">COMMS</text>

          <!-- Thermal -->
          <rect x="130" y="175" width="80" height="16" rx="2" stroke="${c(ss.thermal.status)}" stroke-width="1.5" fill="rgba(255,255,255,0.015)">
            ${pulse(ss.thermal.status)}
          </rect>
          <text x="170" y="186" text-anchor="middle" fill="${c(ss.thermal.status)}" font-size="7" font-family="monospace">THERMAL ${ss.thermal.val}</text>

          <!-- ADCS -->
          <circle cx="135" cy="95" r="10" stroke="${c(ss.adcs.status)}" stroke-width="1.2" fill="none">
            ${pulse(ss.adcs.status)}
          </circle>
          <text x="135" y="98" text-anchor="middle" fill="${c(ss.adcs.status)}" font-size="6" font-family="monospace">ADCS</text>

          <!-- Payload -->
          <rect x="155" y="138" width="30" height="25" rx="2" stroke="${c(ss.payload.status)}" stroke-width="1.5" fill="rgba(255,255,255,0.02)">
            ${pulse(ss.payload.status)}
          </rect>
          <text x="170" y="152" text-anchor="middle" fill="${c(ss.payload.status)}" font-size="6" font-family="monospace">P/L</text>

          <!-- Propulsion -->
          <line x1="170" y1="195" x2="170" y2="220" stroke="${c(ss.propulsion.status)}" stroke-width="1.5"/>
          <polygon points="160,220 170,235 180,220" stroke="${c(ss.propulsion.status)}" stroke-width="1" fill="rgba(255,255,255,0.02)"/>
          <text x="170" y="225" text-anchor="middle" fill="${c(ss.propulsion.status)}" font-size="6" font-family="monospace">${ss.propulsion.val}</text>
        </svg>`
      }

      // ── Build views ─────────────────────────────────────
      const views = {}

      // Fleet panel cards
      const fleetCards = constellation.map(s => {
        const extraCls = s.status === 'anomaly' ? 'has-anomaly' : s.status === 'warning' ? 'has-warning' : ''
        const bCls = s.status === 'anomaly' ? 'b-r' : s.status === 'warning' ? 'b-y' : 'b-g'
        const bText = s.status === 'anomaly' ? 'Anomaly' : s.status === 'warning' ? 'Warning' : 'Nominal'
        const anomCount = Object.values(s.subsystems).filter(v => v.status !== 'ok').length
        return `<div class="sat-card ${extraCls} zoom-me" data-to="sat_${s.id}">
          <div class="sat-name"><span class="b ${bCls}">${bText}</span> ${s.id}</div>
          <div class="sat-meta">${s.type} · ${s.orbit} · ${s.alt < 1000 ? s.alt + ' km' : s.alt < 100000 ? (s.alt/1000).toFixed(0) + 'k km' : (s.alt/1e6).toFixed(1) + 'M km'}</div>
          <div class="sat-telemetry">
            <div class="tel-item"><span class="tel-label">PWR</span><span class="tel-val">${s.subsystems.power.val}</span></div>
            <div class="tel-item"><span class="tel-label">TEMP</span><span class="tel-val">${s.subsystems.thermal.val}</span></div>
            <div class="tel-item"><span class="tel-label">LINK</span><span class="tel-val">${s.subsystems.comms.val}</span></div>
            ${anomCount > 0 ? `<div class="tel-item"><span class="tel-label">ALERTS</span><span class="tel-val c-r">${anomCount}</span></div>` : ''}
          </div>
        </div>`
      }).join('\n')

      const totalAnom = constellation.filter(s => s.status === 'anomaly').length
      const totalWarn = constellation.filter(s => s.status === 'warning').length
      const totalNom = constellation.filter(s => s.status === 'nominal').length

      // Level 1: Mission Control Overview
      views.control = `
        <div class="z-view v">
          <div class="hdr">
            <div class="nasa-mark">MC</div>
            <h1>Mission Control <small>Constellation Operations</small></h1>
            <span class="b b-g" style="margin-left:auto">${totalNom} NOM</span>
            <span class="b b-y">${totalWarn} WRN</span>
            <span class="b b-r">${totalAnom} ANOM</span>
          </div>
          <div class="kpis">
            <div class="kpi"><div class="kpi-l">Constellation</div><div class="kpi-v c-b">${constellation.length} <span class="sm">assets</span></div></div>
            <div class="kpi"><div class="kpi-l">Uplink</div><div class="kpi-v c-c">DSN 3/3</div></div>
            <div class="kpi"><div class="kpi-l">Anomalies</div><div class="kpi-v c-r">${totalAnom + totalWarn}</div></div>
            <div class="kpi"><div class="kpi-l">Data rate</div><div class="kpi-v">332 <span class="sm">Mbps</span></div></div>
            <div class="kpi"><div class="kpi-l">MET</div><div class="kpi-v c-c" id="met">000:00:00</div></div>
          </div>
          <div class="control-layout">
            <div class="orbit-panel">
              ${orbitMapSVG()}
            </div>
            <div class="fleet-panel">
              <div class="fleet-panel-title">Fleet Status · ${constellation.length} assets</div>
              ${fleetCards}
            </div>
          </div>
        </div>
      `

      // Level 2: Satellite detail views (all satellites)
      constellation.forEach(sat => {
        const bCls = sat.status === 'anomaly' ? 'b-r' : sat.status === 'warning' ? 'b-y' : 'b-g'
        const bText = sat.status === 'anomaly' ? 'Anomaly' : sat.status === 'warning' ? 'Warning' : 'Nominal'
        const anomSubs = Object.entries(sat.subsystems).filter(([, v]) => v.status !== 'ok')

        const subsysList = Object.entries(sat.subsystems).map(([key, v]) => {
          const sc = v.status === 'fail' ? 'c-r' : v.status === 'warn' ? 'c-y' : 'c-g'
          const bc = v.status === 'fail' ? 'b-r' : v.status === 'warn' ? 'b-y' : 'b-g'
          const st = v.status === 'fail' ? 'FAIL' : v.status === 'warn' ? 'WARN' : 'NOM'
          const isClickable = v.status !== 'ok'
          const cls = isClickable ? 'subsys zoom-me' : 'subsys'
          const dt = isClickable ? `data-to="issue_${sat.id}_${key}"` : ''
          return `<div class="${cls}" ${dt}>
            <div class="subsys-name"><span class="b ${bc}">${st}</span> ${key.toUpperCase()}</div>
            <div class="subsys-val ${sc}">${v.val}</div>
          </div>`
        }).join('\n')

        views[`sat_${sat.id}`] = `
          <div class="z-view v">
            <div class="bc">Mission Control <span>&rsaquo;</span> ${sat.id}</div>
            <div class="hdr">
              <h1>${sat.id} <small>${sat.type}</small></h1>
              <span class="b ${bCls}" style="margin-left:auto">${bText}</span>
            </div>
            <div class="kpis">
              <div class="kpi"><div class="kpi-l">Orbit</div><div class="kpi-v sm" style="font-size:.9em">${sat.orbit}</div></div>
              <div class="kpi"><div class="kpi-l">Altitude</div><div class="kpi-v c-c">${sat.alt < 1000 ? sat.alt + ' km' : sat.alt < 100000 ? (sat.alt/1000).toFixed(0) + 'k km' : (sat.alt/1e6).toFixed(1) + 'M km'}</div></div>
              <div class="kpi"><div class="kpi-l">Period</div><div class="kpi-v sm" style="font-size:.9em">${sat.period}</div></div>
              <div class="kpi"><div class="kpi-l">Alerts</div><div class="kpi-v c-r">${anomSubs.length}</div></div>
            </div>
            <div class="sat-layout">
              <div class="panel sat-svg-panel">
                ${satelliteSVG(sat)}
              </div>
              <div class="panel">
                <h3>Subsystems</h3>
                <div class="subsys-list">
                  ${subsysList}
                </div>
              </div>
              <div class="panel" style="grid-column: 1 / -1">
                <h3>Orbital Parameters</h3>
                <div style="display:flex;gap:20px;flex-wrap:wrap">
                  <div class="row" style="flex:1;min-width:200px"><span class="row-l">Semi-major axis</span><span>${(6371 + sat.alt).toLocaleString()} km</span></div>
                  <div class="row" style="flex:1;min-width:200px"><span class="row-l">Inclination</span><span>${sat.inc}°</span></div>
                  <div class="row" style="flex:1;min-width:200px"><span class="row-l">Period</span><span>${sat.period}</span></div>
                  <div class="row" style="flex:1;min-width:200px"><span class="row-l">Eccentricity</span><span>${sat.orbit === 'GEO' ? '0.0001' : '0.0012'}</span></div>
                </div>
              </div>
            </div>
          </div>
        `

        // Level 3: Issue detail for each anomalous subsystem
        anomSubs.forEach(([key, v]) => {
          const bc2 = v.status === 'fail' ? 'b-r' : 'b-y'
          const st2 = v.status === 'fail' ? 'Critical' : 'Warning'

          // Generate telemetry bar chart (simulated last 12 readings)
          const nominal = key === 'thermal' ? 22 : key === 'power' ? 29 : key === 'comms' ? 2 : key === 'adcs' ? 0.005 : 50
          const bars = Array.from({ length: 12 }, (_, i) => {
            const drift = v.status === 'fail' ? (i / 11) * 0.6 : (i / 11) * 0.2
            const pct = Math.max(10, Math.min(100, (1 - drift) * 80 + 20))
            const color = pct < 40 ? 'var(--mc-red)' : pct < 65 ? 'var(--mc-yellow)' : 'var(--mc-green)'
            return `<div class="chart-bar" style="height:${pct}%;background:${color}"></div>`
          }).join('')

          views[`issue_${sat.id}_${key}`] = `
            <div class="z-view v">
              <div class="bc">MC <span>&rsaquo;</span> ${sat.id} <span>&rsaquo;</span> ${key.toUpperCase()}</div>
              <div class="hdr">
                <h1>${key.toUpperCase()} <small>${sat.id}</small></h1>
                <span class="b ${bc2}" style="margin-left:auto">${st2}</span>
              </div>
              <div class="kpis">
                <div class="kpi"><div class="kpi-l">Current</div><div class="kpi-v ${v.status === 'fail' ? 'c-r' : 'c-y'}">${v.val}</div></div>
                <div class="kpi"><div class="kpi-l">Status</div><div class="kpi-v ${v.status === 'fail' ? 'c-r' : 'c-y'}">${v.status === 'fail' ? 'FAIL' : 'DEGRADED'}</div></div>
                <div class="kpi"><div class="kpi-l">Priority</div><div class="kpi-v ${v.status === 'fail' ? 'c-r' : 'c-y'}">${v.status === 'fail' ? 'P1' : 'P2'}</div></div>
                <div class="kpi"><div class="kpi-l">Detected</div><div class="kpi-v sm" style="font-size:.85em">UTC 14:${Math.floor(Math.random() * 50 + 10)}</div></div>
              </div>
              <div class="issue-layout">
                <div class="panel">
                  <h3>Diagnosis</h3>
                  <div style="font-size:0.75em;line-height:1.6;padding:4px 0;color:var(--mc-text)">${v.detail}</div>
                  <div class="row" style="margin-top:8px"><span class="row-l">Action</span><span>${v.status === 'fail' ? 'Immediate intervention' : 'Monitor + schedule'}</span></div>
                  <div class="row"><span class="row-l">Owner</span><span>Flight Dynamics Team</span></div>
                  <div class="row"><span class="row-l">Constraint</span><span>${key === 'thermal' ? 'Max 55°C before safe mode' : key === 'power' ? 'Min 24V for payload ops' : key === 'comms' ? 'Min 0.5 Mbps for TT&C' : key === 'payload' ? 'Calibration pending' : 'Monitor'}</span></div>
                  <div class="row"><span class="row-l">Redundancy</span><span>${key === 'thermal' ? 'RW1+RW2+MTQ (active)' : key === 'power' ? 'Cells B13-B24 OK' : key === 'comms' ? 'Backup antenna (active)' : key === 'payload' ? 'Quadrants 1,2,4 OK' : 'N/A'}</span></div>
                </div>
                <div class="panel">
                  <h3>Telemetry — Last 12 readings</h3>
                  <div class="chart-bars">${bars}</div>
                  <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:0.55em;color:var(--mc-muted)">
                    <span>-12h</span><span>-6h</span><span>now</span>
                  </div>
                </div>
                <div class="panel" style="grid-column: 1 / -1">
                  <h3>Event log</h3>
                  <div class="timeline">
                    <div class="tl-item err"><span class="tl-t">14:23 UTC</span><span>Anomaly flag raised by onboard FDIR</span></div>
                    <div class="tl-item warn"><span class="tl-t">14:24 UTC</span><span>Telemetry confirms off-nominal — automated safing partial</span></div>
                    <div class="tl-item"><span class="tl-t">14:26 UTC</span><span>Ground commanded diagnostic sequence uploaded</span></div>
                    <div class="tl-item"><span class="tl-t">14:31 UTC</span><span>Diagnostic telemetry received — root cause identified</span></div>
                    <div class="tl-item"><span class="tl-t">14:35 UTC</span><span>Contingency procedure activated — redundancy online</span></div>
                    <div class="tl-item"><span class="tl-t">14:42 UTC</span><span>Stable on backup — monitoring for 24h observation window</span></div>
                  </div>
                </div>
              </div>
            </div>
          `
        })
      })

      // ── MET clock ──────────────────────────────────────
      const metStart = Date.now()
      function updateMET () {
        const el = document.getElementById('met')
        if (!el) return
        const elapsed = Math.floor((Date.now() - metStart) / 1000)
        const h = String(Math.floor(elapsed / 3600)).padStart(3, '0')
        const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0')
        const s = String(elapsed % 60).padStart(2, '0')
        el.textContent = `${h}:${m}:${s}`
      }
      setInterval(updateMET, 1000)

      // ── Orbit animation pause/resume ───────────────────
      function pauseOrbits () {
        document.querySelectorAll('.orbit-anim, .orbit-anim-2, .orbit-anim-3, .sat-ping, .signal-wave').forEach(el => {
          el.classList.add('paused')
        })
      }

      function resumeOrbits () {
        document.querySelectorAll('.orbit-anim, .orbit-anim-2, .orbit-anim-3, .sat-ping, .signal-wave').forEach(el => {
          el.classList.remove('paused')
        })
      }

      // ── Init ───────────────────────────────────────────
      const app = new ZumlyLib({
        mount: '.canvas',
        initialView: 'control',
        views,
        transitions: {
          duration: '800ms',
          ease: 'ease-in-out',
          cover: 'width',
          effects: ['blur(2px) brightness(0.6)', 'blur(6px) brightness(0.3)'],
          hideTrigger: 'fade',
        },
        debug: false,
      })

      app.init()

      // Pause orbit animations when zooming into a satellite
      app.on('beforeZoomIn', pauseOrbits)
      app.on('afterZoomOut', () => {
        if (app.zoomLevel() <= 1) resumeOrbits()
      })
    </script>
  </body>
</html>
