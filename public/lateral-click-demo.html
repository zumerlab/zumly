<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zumly - Lateral Click Demo</title>
    <link rel="stylesheet" href="/dist/zumly.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #111; }
      .mount {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
      }
      .example { width: 100%; height: 100%; position: relative; }

      /* Home view: grid of cards */
      .home {
        width: 100%; height: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 20px;
        padding: 40px;
        background: #1a1a2e;
      }
      .home h1 {
        grid-column: 1 / -1;
        color: #fff;
        font-size: 1.4rem;
        text-align: center;
        align-self: end;
      }

      .card {
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        font-weight: 600;
        color: #fff;
        transition: transform 0.2s;
        border: 2px solid rgba(255,255,255,0.15);
      }
      .card:hover { transform: scale(1.03); }
      .card small {
        font-weight: 400;
        font-size: 0.75rem;
        opacity: 0.7;
        margin-top: 6px;
      }

      .card-a { background: linear-gradient(135deg, #e74c3c, #c0392b); }
      .card-b { background: linear-gradient(135deg, #2ecc71, #27ae60); }
      .card-c { background: linear-gradient(135deg, #3498db, #2980b9); }

      /* Detail views — smaller so siblings remain visible behind */
      .detail {
        width: 60%; height: 60%;
        margin: 20% auto;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 2rem;
      }
      .detail p { font-size: 1rem; opacity: 0.7; margin-top: 12px; text-align: center; max-width: 400px; }
      .detail-a { background: linear-gradient(135deg, #e74c3c, #c0392b); }
      .detail-b { background: linear-gradient(135deg, #2ecc71, #27ae60); }
      .detail-c { background: linear-gradient(135deg, #3498db, #2980b9); }

      /* Status bar */
      .status {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 100;
        padding: 10px 16px;
        background: rgba(0,0,0,0.85);
        color: #fff;
        font-size: 0.85rem;
        display: flex;
        gap: 20px;
        align-items: center;
      }
      .status strong { color: #f1c40f; }
    </style>
  </head>
  <body>
    <div class="mount">
      <div class="example zumly-canvas"></div>
    </div>

    <div class="status">
      <span id="info">Click a card to zoom in</span>
      <span>|</span>
      <span id="hint">Once zoomed in, click a <strong>sibling card</strong> visible in the background to navigate laterally</span>
    </div>

    <script src="/dist/zumly.js"></script>
    <script>
      const ZumlyLib = window.Zumly || globalThis.Zumly

      const home = `
        <div class="z-view home">
          <h1>Click any card to zoom in. Then click a sibling in the background!</h1>
          <div class="card card-a zoom-me" data-to="detailA">
            A - Red
            <small>zoom-me</small>
          </div>
          <div class="card card-b zoom-me" data-to="detailB">
            B - Green
            <small>zoom-me</small>
          </div>
          <div class="card card-c zoom-me" data-to="detailC">
            C - Blue
            <small>zoom-me</small>
          </div>
        </div>
      `

      const detailA = `
        <div class="z-view detail detail-a">
          <h2>View A (Red)</h2>
          <p>You're zoomed into A. Click on the Green or Blue card visible behind to navigate laterally. Click empty space to zoom out.</p>
        </div>
      `

      const detailB = `
        <div class="z-view detail detail-b">
          <h2>View B (Green)</h2>
          <p>You're zoomed into B. Click on the Red or Blue card visible behind to navigate laterally. Click empty space to zoom out.</p>
        </div>
      `

      const detailC = `
        <div class="z-view detail detail-c">
          <h2>View C (Blue)</h2>
          <p>You're zoomed into C. Click on the Red or Blue card visible behind to navigate laterally. Click empty space to zoom out.</p>
        </div>
      `

      const app = new ZumlyLib({
        mount: '.example',
        initialView: 'home',
        views: { home, detailA, detailB, detailC },
        transitions: {
          driver: 'css',
          duration: '500ms',
          ease: 'ease-in-out',
          cover: 'width',
        },
        debug: true,
      })

      function updateStatus () {
        const el = document.getElementById('info')
        if (el && app) {
          const view = app.getCurrentViewName?.() || '?'
          const level = app.getZoomLevel?.() || '?'
          el.innerHTML = `View: <strong>${view}</strong> | Level: <strong>${level}</strong>`
        }
      }

      app.init().then(() => {
        updateStatus()
        app.on('afterZoomIn', updateStatus)
        app.on('afterZoomOut', updateStatus)
        app.on('afterLateral', updateStatus)
      })
    </script>
  </body>
</html>
