<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zumly + Angular Demo</title>
    <link rel="stylesheet" href="/dist/zumly.css" />
    <style>
      html, body { height: 100%; margin: 0; overflow: hidden; font-family: system-ui, sans-serif; background: #0b1020; }
      #app { position: absolute; top: 52px; left: 0; right: 0; bottom: 0; }
      .info-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 12px 16px; background: rgba(11,16,32,0.95); border-bottom: 1px solid rgba(221,0,49,0.4); color: #e8ecff; font-size: 14px; }
      .info-bar strong { color: #dd0031; }
      .z-view { box-sizing: border-box; padding: 32px; color: #e8ecff; }
      .card { margin-top: 12px; padding: 14px 18px; border-radius: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(221,0,49,0.6); width: fit-content; cursor: zoom-in; transition: background 0.2s; }
      .card:hover { background: rgba(255,255,255,0.12); }
      .cards { display: flex; flex-wrap: wrap; gap: 10px; }
    </style>
  </head>
  <body>
    <div class="info-bar">
      <strong>Zumly + Angular</strong> — Angular-style components (class-based with templates) as Zumly views
    </div>
    <div id="app">
      <div class="demo zumly-canvas"></div>
    </div>

    <script src="/dist/zumly.js"></script>

    <script type="module">
      // Angular requires a full build toolchain (CLI, TypeScript, zone.js).
      // For this demo we simulate the Angular pattern using vanilla JS
      // that mirrors Angular's class-based component architecture:
      // - Class with properties and methods
      // - Template with bindings
      // - Change detection via manual render

      // ── Angular-style Component Base ──────────────────────────────

      class Component {
        constructor(target, props = {}) {
          this._target = target
          this._props = props
          this._el = document.createElement('div')
          this._el.className = 'z-view'
          this.onInit()
          this._render()
          target.appendChild(this._el)
        }

        onInit() {} // lifecycle hook (ngOnInit)

        template() { return '' }

        _render() {
          this._el.innerHTML = this.template()
          this.afterViewInit()
        }

        afterViewInit() {} // lifecycle hook (ngAfterViewInit)

        detectChanges() { this._render() }

        querySelector(sel) { return this._el.querySelector(sel) }
        querySelectorAll(sel) { return this._el.querySelectorAll(sel) }
      }

      // ── Counter Component ─────────────────────────────────────────

      class CounterComponent extends Component {
        count = 0

        onInit() {
          this._el.style.cssText = 'background: linear-gradient(135deg, #3e0a1a, #4e1b2b); width: 500px; height: 350px; padding: 32px; color: #e8ecff'
        }

        template() {
          return `
            <span style="background: #dd0031; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600">ANGULAR-STYLE</span>
            <h2 style="margin: 12px 0 8px">Counter Component</h2>
            <p style="opacity: 0.7; font-size: 14px">Class-based component with properties and methods, Angular-style.</p>
            <div style="display: flex; align-items: center; gap: 12px; margin: 16px 0">
              <button data-action="dec" style="padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(221,0,49,0.6); background: rgba(221,0,49,0.15); color: #dd0031; font-size: 16px; cursor: pointer">&minus;</button>
              <span style="font-size: 24px; min-width: 40px; text-align: center">${this.count}</span>
              <button data-action="inc" style="padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(221,0,49,0.6); background: rgba(221,0,49,0.15); color: #dd0031; font-size: 16px; cursor: pointer">+</button>
            </div>
            <div class="card zoom-me" data-to="home" style="margin-top: 24px">&larr; Back</div>
          `
        }

        afterViewInit() {
          this.querySelector('[data-action="dec"]')?.addEventListener('click', () => this.decrement())
          this.querySelector('[data-action="inc"]')?.addEventListener('click', () => this.increment())
        }

        increment() { this.count++; this.detectChanges() }
        decrement() { this.count--; this.detectChanges() }
      }

      // ── Form Component (reactive forms style) ─────────────────────

      class FormComponent extends Component {
        formData = { name: '', email: '', message: '' }
        submitted = false

        onInit() {
          this._el.style.cssText = 'background: linear-gradient(135deg, #1a1a3e, #2d1b4e); width: 520px; height: 450px; padding: 32px; color: #e8ecff'
        }

        template() {
          if (this.submitted) {
            return `
              <span style="background: #7c3aed; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600">ANGULAR-STYLE</span>
              <h2 style="margin: 12px 0 8px">Form Submitted!</h2>
              <div style="padding: 16px; border-radius: 12px; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); margin: 16px 0">
                <div><strong>Name:</strong> ${this.formData.name}</div>
                <div><strong>Email:</strong> ${this.formData.email}</div>
                <div><strong>Message:</strong> ${this.formData.message}</div>
              </div>
              <button data-action="reset" style="padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(124,58,237,0.6); background: rgba(124,58,237,0.15); color: #7c3aed; cursor: pointer">Reset</button>
              <div class="card zoom-me" data-to="home" style="margin-top: 16px">&larr; Back</div>
            `
          }
          return `
            <span style="background: #7c3aed; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600">ANGULAR-STYLE</span>
            <h2 style="margin: 12px 0 8px">Reactive Form</h2>
            <p style="opacity: 0.7; font-size: 14px">Angular-style form with two-way binding and validation.</p>
            <div style="display: flex; flex-direction: column; gap: 8px; margin: 12px 0">
              <input data-field="name" placeholder="Name" value="${this.formData.name}"
                style="padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff" />
              <input data-field="email" placeholder="Email" value="${this.formData.email}"
                style="padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff" />
              <textarea data-field="message" placeholder="Message" rows="3"
                style="padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; resize: none">${this.formData.message}</textarea>
              <button data-action="submit"
                style="padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(124,58,237,0.6); background: rgba(124,58,237,0.25); color: #7c3aed; cursor: pointer; align-self: flex-start">Submit</button>
            </div>
            <div class="card zoom-me" data-to="home">&larr; Back</div>
          `
        }

        afterViewInit() {
          this.querySelectorAll('[data-field]').forEach(input => {
            input.addEventListener('input', (e) => {
              this.formData[e.target.dataset.field] = e.target.value
            })
          })
          this.querySelector('[data-action="submit"]')?.addEventListener('click', () => this.onSubmit())
          this.querySelector('[data-action="reset"]')?.addEventListener('click', () => this.onReset())
        }

        onSubmit() { this.submitted = true; this.detectChanges() }
        onReset() { this.formData = { name: '', email: '', message: '' }; this.submitted = false; this.detectChanges() }
      }

      // ── Data Table Component (service-style data) ─────────────────

      class DataTableComponent extends Component {
        data = []
        loading = true
        sortField = 'name'
        sortAsc = true

        onInit() {
          this._el.style.cssText = 'background: linear-gradient(135deg, #3e3a1a, #4e4b1b); width: 540px; height: 420px; padding: 32px; color: #e8ecff'
          // Simulate service injection / HTTP call
          setTimeout(() => {
            this.data = [
              { name: 'Alpha', status: 'Active', score: 92 },
              { name: 'Beta', status: 'Inactive', score: 67 },
              { name: 'Gamma', status: 'Active', score: 85 },
              { name: 'Delta', status: 'Pending', score: 43 },
            ]
            this.loading = false
            this.detectChanges()
          }, 400)
        }

        get sortedData() {
          return [...this.data].sort((a, b) => {
            const va = a[this.sortField], vb = b[this.sortField]
            const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb
            return this.sortAsc ? cmp : -cmp
          })
        }

        template() {
          if (this.loading) {
            return `
              <span style="background: #d97706; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600">ANGULAR-STYLE</span>
              <h2 style="margin: 12px 0 8px">Data Table</h2>
              <div style="opacity: 0.5; padding: 32px; text-align: center">Loading data from service...</div>
            `
          }

          const arrow = this.sortAsc ? '▲' : '▼'
          return `
            <span style="background: #d97706; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600">ANGULAR-STYLE</span>
            <h2 style="margin: 12px 0 8px">Data Table</h2>
            <p style="opacity: 0.7; font-size: 14px">Sortable table with service-injected data. Click headers to sort.</p>
            <table style="width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px">
              <thead>
                <tr style="border-bottom: 2px solid rgba(217,119,6,0.4)">
                  <th data-sort="name" style="text-align: left; padding: 8px; cursor: pointer">Name ${this.sortField === 'name' ? arrow : ''}</th>
                  <th data-sort="status" style="text-align: left; padding: 8px; cursor: pointer">Status ${this.sortField === 'status' ? arrow : ''}</th>
                  <th data-sort="score" style="text-align: right; padding: 8px; cursor: pointer">Score ${this.sortField === 'score' ? arrow : ''}</th>
                </tr>
              </thead>
              <tbody>
                ${this.sortedData.map(row => `
                  <tr style="border-bottom: 1px solid rgba(255,255,255,0.06)">
                    <td style="padding: 8px">${row.name}</td>
                    <td style="padding: 8px"><span style="padding: 2px 8px; border-radius: 10px; font-size: 11px; background: ${row.status === 'Active' ? 'rgba(34,197,94,0.2)' : row.status === 'Pending' ? 'rgba(217,119,6,0.2)' : 'rgba(255,255,255,0.1)'}; color: ${row.status === 'Active' ? '#22c55e' : row.status === 'Pending' ? '#d97706' : '#888'}">${row.status}</span></td>
                    <td style="padding: 8px; text-align: right; font-family: monospace">${row.score}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            <div class="card zoom-me" data-to="home">&larr; Back</div>
          `
        }

        afterViewInit() {
          this.querySelectorAll('[data-sort]').forEach(th => {
            th.addEventListener('click', () => this.sort(th.dataset.sort))
          })
        }

        sort(field) {
          if (this.sortField === field) { this.sortAsc = !this.sortAsc }
          else { this.sortField = field; this.sortAsc = true }
          this.detectChanges()
        }
      }

      // ── Zumly setup ───────────────────────────────────────────────

      const home = `
        <div class="z-view" style="background: linear-gradient(135deg, #0b1020, #1a1a3e); width: 600px; height: 400px">
          <h2>Zumly + Angular</h2>
          <p style="opacity:0.7; font-size:14px">Each card zooms into an Angular-style component (class-based).<br>
          <small style="opacity:0.6">Note: real Angular needs CLI + TypeScript. These mirror the pattern.</small></p>
          <div class="cards">
            <div class="card zoom-me" data-to="counter">
              <strong>Counter</strong><br><small style="opacity:0.6">Class methods</small>
            </div>
            <div class="card zoom-me" data-to="form">
              <strong>Form</strong><br><small style="opacity:0.6">Reactive bindings</small>
            </div>
            <div class="card zoom-me" data-to="dataTable">
              <strong>Data Table</strong><br><small style="opacity:0.6">Service + sorting</small>
            </div>
          </div>
        </div>
      `

      const app = new Zumly({
        mount: '.demo',
        initialView: 'home',
        views: {
          home,
          counter: ({ target }) => { new CounterComponent(target) },
          form: ({ target }) => { new FormComponent(target) },
          dataTable: ({ target }) => { new DataTableComponent(target) }
        },
        transitions: { driver: 'waapi', duration: '600ms', ease: 'ease-in-out' },
        debug: true
      })

      app.init()
    </script>
  </body>
</html>
